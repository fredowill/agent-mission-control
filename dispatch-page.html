<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dispatch &mdash; Mission Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fff;--bg2:#fafafa;--surface:#f4f4f5;--surface2:#e4e4e7;
  --text:#09090b;--text2:#52525b;--text3:#a1a1aa;--sep:#e4e4e7;
  --purple:#8b5cf6;--purple-bg:rgba(139,92,246,0.06);
  --blue:#3b82f6;--blue-bg:rgba(59,130,246,0.06);
  --green:#22c55e;--green-bg:rgba(34,197,94,0.06);
  --amber:#f59e0b;--amber-bg:rgba(245,158,11,0.06);
  --rose:#ef4444;--rose-bg:rgba(239,68,68,0.05);
  --radius:12px;
}
body{background:var(--bg2);color:var(--text);font-family:'DM Sans',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;min-height:100vh}

/* ── Header ── */
header{display:flex;align-items:center;justify-content:space-between;padding:0 clamp(24px,4vw,48px);height:64px;background:var(--bg);border-bottom:1px solid var(--sep);position:sticky;top:0;z-index:50}
.logo{display:flex;align-items:center;gap:10px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--purple)}
.logo-text{font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:700;letter-spacing:-0.02em}
.header-nav{display:flex;gap:2px;padding:3px;background:var(--surface);border-radius:8px;position:absolute;left:50%;transform:translateX(-50%)}
.nav-link{padding:5px 14px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--text3);text-decoration:none;transition:all .15s;white-space:nowrap}
.nav-link:hover{color:var(--text2)}
.nav-link.active{background:var(--bg);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.06)}
.header-right{display:flex;align-items:center;gap:8px}
.h-search{width:160px;padding:6px 10px;border:1px solid var(--sep);border-radius:6px;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--text);background:var(--bg2);outline:none;transition:all .15s}
.h-search:focus{border-color:var(--purple);width:220px;background:var(--bg)}
.h-search::placeholder{color:var(--text3)}

/* ── Page Title Area ── */
.page-header{max-width:1400px;margin:0 auto;padding:28px 20px 0}
.page-title-row{display:flex;align-items:baseline;gap:16px;margin-bottom:18px}
.page-title-row h1{font-family:'Plus Jakarta Sans',sans-serif;font-size:28px;font-weight:800;letter-spacing:-0.04em}
.top-stats{display:flex;gap:12px}
.t-stat{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);display:flex;align-items:center;gap:3px}
.t-stat strong{font-weight:700}
.t-stat .rose{color:var(--rose)}
.t-stat .blue{color:var(--blue)}
.t-stat .green{color:var(--green)}
/* Filter bar */
.filter-bar{display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--bg);border:1px solid var(--sep);border-radius:10px;flex-wrap:wrap}
.filter-label{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;color:var(--text3);margin-right:4px}
.f-pill{display:flex;align-items:center;gap:4px;padding:5px 12px;border-radius:100px;font-size:11px;font-weight:500;background:transparent;border:1px solid var(--sep);color:var(--text3);cursor:pointer;transition:all .12s;user-select:none}
.f-pill:hover{border-color:var(--text3);color:var(--text2)}
.f-pill.active{border-color:var(--purple);color:var(--purple);background:var(--purple-bg)}
.f-pill .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.add-btn{display:flex;align-items:center;gap:4px;padding:7px 16px;border-radius:8px;font-size:12px;font-weight:600;background:var(--purple);color:#fff;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .12s;margin-left:auto}
.add-btn:hover{background:#7c3aed}

/* ── Kanban Board ── */
.kanban{display:grid;grid-template-columns:auto 1fr 1fr auto;gap:12px;padding:14px 20px 40px;min-height:calc(100vh - 140px);max-width:1400px;margin:0 auto;transition:max-width .3s ease}
/* When both side columns collapse, narrow the board so cards don't stretch too wide */
.kanban.both-collapsed{max-width:920px}
.column{background:var(--surface);border-radius:var(--radius);display:flex;flex-direction:column;min-height:200px}
.col-header{padding:12px 14px 10px;display:flex;align-items:center;gap:7px;flex-shrink:0;cursor:default;border-bottom:1px solid var(--sep)}
.col-dot{width:7px;height:7px;border-radius:50%}
.col-dot.ip{background:var(--blue)}
.col-dot.todo{background:var(--amber)}
.col-dot.backlog{background:var(--text3)}
.col-dot.done{background:var(--green)}
.col-name{font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;letter-spacing:-0.01em}
.col-count{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);margin-left:auto;background:var(--bg);padding:1px 6px;border-radius:100px}
.col-body{flex:1;padding:10px 10px 14px;overflow-y:auto;display:flex;flex-direction:column;gap:6px}
.col-body::-webkit-scrollbar{width:4px}
.col-body::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:2px}

/* Backlog — collapses horizontally to thin strip */
.column.backlog-col{background:var(--bg);border:1px solid var(--sep);width:180px;transition:width .25s ease}
.column.backlog-col .col-header{cursor:pointer;user-select:none}
.column.backlog-col .col-header .chevron{font-size:9px;color:var(--text3);transition:transform .2s;margin-left:2px}
.column.backlog-col .k-card{opacity:0.6}
.column.backlog-col .k-card:hover{opacity:1}
/* Collapsed: thin vertical strip */
.column.backlog-col.collapsed{width:36px;min-height:200px;overflow:hidden}
.column.backlog-col.collapsed .col-header{flex-direction:column;padding:12px 4px;gap:8px;align-items:center;height:100%}
.column.backlog-col.collapsed .col-header .chevron{transform:rotate(-90deg)}
.column.backlog-col.collapsed .col-name{writing-mode:vertical-lr;text-orientation:mixed;transform:rotate(180deg);font-size:11px;letter-spacing:0.02em}
.column.backlog-col.collapsed .col-dot{flex-shrink:0}
.column.backlog-col.collapsed .col-count{margin-left:0;margin-top:auto}
.column.backlog-col.collapsed .col-body{display:none}

/* Drop zone */
.col-body.drag-over{background:rgba(139,92,246,0.03);border-radius:8px}
/* Drop indicator line between cards */
.drop-indicator{height:3px;background:var(--purple);border-radius:2px;margin:2px 4px;animation:dropPulse .6s ease infinite alternate}
@keyframes dropPulse{from{opacity:.5}to{opacity:1}}

/* ── Workstream Sub-Group with tinted container ── */
.ws-group{margin-bottom:14px;padding:10px 10px 10px;border-radius:14px;background:rgba(0,0,0,0.015)}
.ws-group.ws-purple{background:rgba(139,92,246,0.04);border:1px solid rgba(139,92,246,0.08)}
.ws-group.ws-blue{background:rgba(59,130,246,0.04);border:1px solid rgba(59,130,246,0.08)}
.ws-group.ws-green{background:rgba(34,197,94,0.04);border:1px solid rgba(34,197,94,0.08)}
.ws-group.ws-amber{background:rgba(245,158,11,0.04);border:1px solid rgba(245,158,11,0.08)}
.ws-group.ws-other{background:rgba(0,0,0,0.015);border:1px solid rgba(0,0,0,0.04)}
.ws-group-label{display:flex;align-items:center;gap:6px;padding:4px 6px 8px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--text2);cursor:pointer;user-select:none;border-radius:8px;transition:background .15s,transform .12s cubic-bezier(.4,.2,.2,1)}
.ws-group-label:hover{background:rgba(0,0,0,0.05)}
.ws-group-label:active{transform:scale(0.975)}
.ws-group-label .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ws-group-label .ws-chevron{margin-left:auto;font-size:10px;color:var(--text3);transition:transform .35s cubic-bezier(.4,.2,.2,1)}
.ws-group.collapsed .ws-chevron{transform:rotate(-90deg)}
.ws-group-label .ws-group-count{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);font-weight:500}
.ws-grip{display:flex;align-items:center;justify-content:center;width:16px;height:18px;cursor:grab;opacity:0;transition:opacity .15s;color:var(--text3);flex-shrink:0;border-radius:4px;margin-left:-2px}
.ws-group-label:hover .ws-grip{opacity:0.5}
.ws-grip:hover{opacity:1 !important;background:rgba(0,0,0,0.05);color:var(--text2)}
.ws-grip:active{cursor:grabbing;color:var(--text)}
.ws-grip svg{pointer-events:none}
.ws-group.ws-custom-dragging{opacity:0.25;transition:opacity .15s ease}
.ws-group.ws-drop-target{outline:2px dashed var(--purple);outline-offset:2px;border-radius:14px;background:rgba(139,92,246,0.06) !important}
.ws-group.ws-drop-target .ws-group-label{color:var(--purple)}
.ws-drag-ghost{position:fixed;z-index:1000;pointer-events:none;display:flex;align-items:center;gap:6px;padding:6px 12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,0.18);transform:scale(1.03);transition:opacity .1s}
.ws-drop-line{left:4px;right:4px;height:3px;border-radius:2px;background:var(--purple);z-index:99;margin:6px 0;animation:wsLinePop .15s ease forwards}
@keyframes wsLinePop{from{transform:scaleX(0)}to{transform:scaleX(1)}}

/* ── Cards (Trello-style) ── */
.ws-group-cards{display:flex;flex-direction:column;gap:12px;overflow:hidden;transition:max-height .4s cubic-bezier(.4,.2,.2,1),opacity .3s ease;max-height:5000px;opacity:1;padding:2px 0}
.ws-group.collapsed > .ws-group-cards{max-height:0 !important;opacity:0;pointer-events:none;padding:0}
.k-card{background:var(--bg);border:1px solid rgba(0,0,0,.06);border-radius:12px;padding:0;cursor:grab;transition:box-shadow .25s cubic-bezier(.4,.2,.2,1),transform .25s cubic-bezier(.4,.2,.2,1),border-color .2s;position:relative;box-shadow:0 1px 3px rgba(0,0,0,.06);overflow:hidden;min-height:80px}
.k-card:hover{box-shadow:0 6px 20px rgba(0,0,0,.08);transform:translateY(-2px);border-color:rgba(0,0,0,.1)}
.k-card:active{cursor:grabbing;transform:scale(0.98);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.k-card.dragging{opacity:0.4;transform:rotate(1.5deg) scale(1.02);box-shadow:0 12px 32px rgba(0,0,0,.12)}
/* Priority color bar at top of card */
.k-card .k-bar{height:3px}
.k-card.p0 .k-bar{background:var(--rose)}
.k-card.p1 .k-bar{background:var(--amber)}
.k-card.p2 .k-bar{background:var(--blue)}
.k-card.p3 .k-bar{background:var(--surface2)}
.k-card .k-inner{padding:14px 16px 16px;display:flex;flex-direction:column;gap:8px}
/* Card top row: label pill + date */
.k-labels{display:flex;align-items:center;gap:6px}
.k-ws-pill{display:inline-flex;align-items:center;gap:4px;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;padding:3px 9px;border-radius:6px;letter-spacing:.01em}
.k-ws-pill .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.k-ws-pill.ws-purple{background:rgba(139,92,246,0.12);color:#7c3aed}
.k-ws-pill.ws-blue{background:rgba(59,130,246,0.12);color:#2563eb}
.k-ws-pill.ws-green{background:rgba(34,197,94,0.12);color:#16a34a}
.k-ws-pill.ws-amber{background:rgba(245,158,11,0.12);color:#b45309}
.k-ws-pill.ws-other{background:var(--surface);color:var(--text3)}
.k-date{font-family:'DM Mono',monospace;font-size:9.5px;color:var(--text3);margin-left:auto}
/* Card title */
.k-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:700;letter-spacing:-0.025em;line-height:1.4;color:var(--text);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
/* Area tags — sub-labels showing which MC page/area a task targets */
.k-areas{display:flex;flex-wrap:wrap;gap:4px;margin-top:3px}
.k-area-tag{display:inline-flex;align-items:center;gap:3px;font-size:9.5px;font-weight:600;padding:2px 7px 2px 5px;border-radius:4px;letter-spacing:.02em;font-family:'DM Mono',monospace;line-height:1.3;white-space:nowrap}
.k-area-tag .area-icon{font-size:10px;line-height:1}
.area-dashboard{background:rgba(59,130,246,0.09);color:#2563eb}
.area-dispatch{background:rgba(99,102,241,0.09);color:#6366f1}
.area-findings{background:rgba(20,184,166,0.09);color:#0d9488}
.area-workflow{background:rgba(249,115,22,0.09);color:#ea580c}
.area-postmortems{background:rgba(239,68,68,0.07);color:#dc2626}
.area-toolbox{background:rgba(16,185,129,0.09);color:#059669}
.area-logic{background:rgba(168,85,247,0.09);color:#9333ea}
.area-radar{background:rgba(6,182,212,0.09);color:#0891b2}
.area-hooks{background:rgba(100,116,139,0.09);color:#475569}
.area-agents{background:rgba(236,72,153,0.09);color:#db2777}
.area-prompts{background:rgba(161,161,170,0.09);color:#52525b}
.area-search{background:rgba(37,99,235,0.09);color:#1d4ed8}
.area-notifications{background:rgba(245,158,11,0.09);color:#d97706}
.area-infra{background:rgba(120,113,108,0.09);color:#57534e}
.area-bug{background:rgba(220,38,38,0.09);color:#b91c1c}
.area-demo{background:rgba(139,92,246,0.09);color:#7c3aed}

/* Done column — collapsible like backlog */
.column.done-col{background:var(--bg);border:1px solid var(--sep);width:260px;transition:width .25s ease}
.column.done-col .col-header{cursor:pointer;user-select:none}
.column.done-col .col-header .chevron{font-size:9px;color:var(--text3);transition:transform .2s;margin-left:2px}
.column.done-col .k-card{opacity:0.55}
.column.done-col .k-card:hover{opacity:1}
.column.done-col.collapsed{width:36px;min-height:200px;overflow:hidden}
.column.done-col.collapsed .col-header{flex-direction:column;padding:12px 4px;gap:8px;align-items:center;height:100%}
.column.done-col.collapsed .col-header .chevron{transform:rotate(90deg)}
.column.done-col.collapsed .col-name{writing-mode:vertical-lr;text-orientation:mixed;font-size:11px;letter-spacing:0.02em}
.column.done-col.collapsed .col-dot{flex-shrink:0}
.column.done-col.collapsed .col-count{margin-left:0;margin-top:auto}
.column.done-col.collapsed .col-body{display:none}

/* Empty state */
.col-empty{display:flex;align-items:center;justify-content:center;flex:1;font-size:11px;color:var(--text3);font-style:italic;padding:16px}

/* ── Detail Modal ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);backdrop-filter:blur(10px);z-index:100;justify-content:center;align-items:center;padding:24px}
.modal-bg.open{display:flex}
.modal-box{background:var(--bg);border-radius:16px;max-width:860px;width:95%;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 24px 80px rgba(0,0,0,.15);animation:modalIn .2s ease;position:relative;overflow:hidden}
@keyframes modalIn{from{opacity:0;transform:translateY(12px) scale(0.97)}to{opacity:1;transform:none}}
.modal-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:8px;border:none;background:var(--surface);color:var(--text3);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;z-index:1;transition:all .12s}
.modal-close:hover{background:var(--surface2);color:var(--text)}
/* Modal header with color bar */
.modal-bar{height:5px;flex-shrink:0}
.modal-bar.p0{background:var(--rose)}
.modal-bar.p1{background:var(--amber)}
.modal-bar.p2{background:var(--blue)}
.modal-bar.p3{background:var(--surface2)}
.modal-top{padding:24px 28px 0;flex-shrink:0}
.modal-scroll{overflow-y:auto;padding:0 28px 28px;flex:1}
/* Two-column: main content + sidebar */
.modal-layout{display:grid;grid-template-columns:1fr 220px;gap:28px;margin-top:16px}
@media(max-width:600px){.modal-layout{grid-template-columns:1fr}}
.modal-main{min-width:0}
.modal-sidebar{display:flex;flex-direction:column;gap:18px;position:sticky;top:0;align-self:start}
/* Inline-editable title */
.m-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:22px;font-weight:800;letter-spacing:-0.03em;line-height:1.3;margin-bottom:4px;cursor:text;border-radius:6px;padding:2px 4px;margin:-2px -4px;transition:background .12s}
.m-title:hover{background:var(--surface)}
.m-title-input{font-family:'Plus Jakarta Sans',sans-serif;font-size:22px;font-weight:800;letter-spacing:-0.03em;line-height:1.3;border:2px solid var(--purple);border-radius:8px;padding:4px 8px;width:100%;outline:none;background:var(--bg);color:var(--text);margin-bottom:4px}
/* Description */
.m-desc{font-size:14px;line-height:1.8;color:var(--text);white-space:pre-wrap;margin-bottom:0;word-break:break-word}
.m-desc strong,.m-desc b{font-weight:700;color:var(--text)}
.m-desc code{font-family:'DM Mono',monospace;font-size:12px;padding:2px 6px;border-radius:4px;background:rgba(139,92,246,0.08);color:#7c3aed}
.m-desc-section{margin-top:16px}
.m-desc-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:8px}
.m-desc-box{padding:16px 18px;background:var(--bg2);border-radius:10px;border:1px solid var(--sep);cursor:text;transition:border-color .12s;max-height:320px;overflow-y:auto}
.m-desc-box:hover{border-color:var(--text3)}
.m-desc-box::-webkit-scrollbar{width:4px}
.m-desc-box::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:2px}
.m-desc-empty{color:var(--text3);font-style:italic;font-size:13px}
.m-desc-textarea{width:100%;min-height:120px;border:2px solid var(--purple);border-radius:10px;padding:14px 16px;font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.7;color:var(--text);background:var(--bg);outline:none;resize:vertical}
/* ── Custom Description Editor (native textarea + toolbar) ── */
.m-editor-wrap{margin-top:4px}
.m-editor-toolbar{display:flex;align-items:center;gap:2px;padding:4px;background:var(--bg2);border-radius:8px;margin-bottom:6px}
.m-editor-toolbar button{display:flex;align-items:center;justify-content:center;width:30px;height:28px;border:none;border-radius:6px;background:transparent;color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;transition:all .1s}
.m-editor-toolbar button:hover{background:var(--surface);color:var(--text)}
.m-editor-toolbar button.active{background:var(--purple-bg);color:var(--purple)}
.m-editor-toolbar .tb-sep{width:1px;height:16px;background:var(--sep);margin:0 4px;flex-shrink:0}
.m-editor-ta{width:100%;min-height:120px;max-height:300px;border:1px solid var(--sep);border-radius:10px;padding:12px 14px;font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.6;color:var(--text);background:var(--bg);outline:none;resize:none;transition:border-color .12s}
.m-editor-ta:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(139,92,246,.08)}
.m-editor-ta::placeholder{color:var(--text3)}
.m-editor-preview{padding:14px 16px;background:var(--bg2);border-radius:10px;border:1px solid var(--sep);max-height:300px;overflow-y:auto;font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.7;color:var(--text)}
.m-editor-preview h1,.m-editor-preview h2,.m-editor-preview h3{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;letter-spacing:-0.02em;margin:12px 0 6px;color:var(--text)}
.m-editor-preview h1{font-size:18px}.m-editor-preview h2{font-size:16px}.m-editor-preview h3{font-size:15px}
.m-editor-preview code{font-family:'DM Mono',monospace;font-size:12px;padding:2px 6px;border-radius:4px;background:rgba(139,92,246,0.08);color:#7c3aed}
.m-editor-preview pre{background:var(--surface);border-radius:8px;padding:12px;margin:8px 0;overflow-x:auto}
.m-editor-preview pre code{background:none;padding:0;font-size:13px;color:var(--text)}
.m-editor-preview ul,.m-editor-preview ol{padding-left:20px;margin:4px 0}
.m-editor-preview li{margin:2px 0}
.m-editor-preview strong{font-weight:700}
.m-editor-preview blockquote{border-left:3px solid var(--purple);padding-left:12px;margin:8px 0;color:var(--text2)}
.m-editor-actions{display:flex;gap:8px;margin-top:10px;justify-content:flex-end}
.m-editor-actions .m-btn{padding:7px 16px;font-size:12px}
/* Sidebar fields */
.m-field{display:flex;flex-direction:column;gap:4px}
.m-field-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3)}
.m-field-value{font-size:13px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:6px}
.m-field-value .dot{width:7px;height:7px;border-radius:50%}
/* Custom dropdown */
.m-dropdown{position:relative;width:100%}
.m-dropdown-trigger{display:flex;align-items:center;gap:6px;padding:6px 10px;border:1px solid var(--sep);border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--text);background:var(--bg);transition:all .12s;user-select:none}
.m-dropdown-trigger:hover{border-color:var(--purple);background:var(--purple-bg)}
.m-dropdown-trigger .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.m-dropdown-trigger .arrow{margin-left:auto;font-size:8px;color:var(--text3);transition:transform .2s}
.m-dropdown.open .m-dropdown-trigger{border-color:var(--purple);box-shadow:0 0 0 3px rgba(139,92,246,.08)}
.m-dropdown.open .arrow{transform:rotate(180deg)}
.m-dropdown-menu{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--bg);border:1px solid var(--sep);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:10;overflow:hidden;opacity:0;transform:translateY(-4px) scale(0.98);pointer-events:none;transition:all .15s ease}
.m-dropdown.open .m-dropdown-menu{opacity:1;transform:none;pointer-events:auto}
.m-dropdown-item{display:flex;align-items:center;gap:8px;padding:8px 12px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--text);cursor:pointer;transition:background .1s}
.m-dropdown-item:hover{background:var(--surface)}
.m-dropdown-item.selected{background:var(--purple-bg);color:var(--purple);font-weight:600}
.m-dropdown-item .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
/* Tags (inline editable) */
.m-tags{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.m-areas{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.m-tag{font-family:'DM Mono',monospace;font-size:10px;padding:4px 10px;border-radius:6px;background:var(--surface);color:var(--text2);border:1px solid var(--sep)}
.m-tags-edit{font-family:'DM Mono',monospace;font-size:11px;padding:4px 8px;border:1px solid var(--purple);border-radius:6px;outline:none;background:var(--bg);color:var(--text);width:120px}
.m-tag-add{font-size:10px;padding:4px 10px;border-radius:6px;background:var(--surface);border:1px solid var(--sep);color:var(--text3);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .12s}
.m-tag-add:hover{border-color:var(--purple);color:var(--purple);background:var(--purple-bg)}
/* Session link */
.m-session-link{font-family:'DM Mono',monospace;font-size:11px;color:var(--purple);text-decoration:none;padding:4px 8px;background:var(--purple-bg);border-radius:6px;display:inline-block}
.m-session-link:hover{background:rgba(139,92,246,0.12)}
/* Dates */
.m-dates{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);display:flex;flex-direction:column;gap:2px}
/* Actions */
.m-actions{display:flex;gap:8px;padding:16px 28px;border-top:1px solid var(--sep);flex-shrink:0;background:var(--bg)}
.m-btn{padding:9px 18px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .12s;border:1px solid var(--sep);background:var(--bg);color:var(--text2)}
.m-btn:hover{background:var(--surface)}
.m-btn.primary{background:var(--purple);color:#fff;border:none}
.m-btn.primary:hover{background:#7c3aed}
.m-btn.danger{color:var(--rose);border-color:transparent}
.m-btn.danger:hover{background:var(--rose-bg)}
.m-btn-group{margin-left:auto;display:flex;gap:8px}

/* Priority / status badges */
.badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:3px 9px;border-radius:100px;display:inline-flex;align-items:center}
.badge.p0{background:var(--rose-bg);color:#dc2626}
.badge.p1{background:var(--amber-bg);color:#92400e}
.badge.p2{background:var(--blue-bg);color:#1d4ed8}
.badge.p3{background:var(--surface);color:var(--text3)}
.badge.status{background:var(--surface);color:var(--text3)}
.badge-ws{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--text3)}
.badge-ws .dot{width:6px;height:6px;border-radius:50%}
.badge-time{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3)}

/* ── Form Modal ── */
.form-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.25);backdrop-filter:blur(8px);z-index:200;justify-content:center;align-items:center;padding:24px}
.form-bg.open{display:flex}
.form-card{background:var(--bg);border-radius:16px;width:90%;max-width:480px;box-shadow:0 24px 80px rgba(0,0,0,.12);animation:modalIn .2s ease;overflow:hidden}
.form-header{padding:20px 24px 14px;border-bottom:1px solid var(--sep)}
.form-header h2{font-family:'Plus Jakarta Sans',sans-serif;font-size:17px;font-weight:800;letter-spacing:-0.03em}
.form-header p{font-size:12px;color:var(--text3);margin-top:2px}
.form-body{padding:16px 24px 20px}
.fg{margin-bottom:12px}
.fg label{display:block;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:600;color:var(--text);margin-bottom:4px}
.fg input,.fg textarea,.fg select{width:100%;padding:9px 12px;border:1px solid var(--sep);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);background:var(--bg);outline:none;transition:all .15s}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(139,92,246,.08)}
.fg input::placeholder,.fg textarea::placeholder{color:var(--text3)}
.fg textarea{resize:vertical;min-height:80px;line-height:1.6}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-footer{padding:0 24px 20px;display:flex;gap:8px}

/* ── Search Dropdown ── */
.search-drop{display:none;position:fixed;top:56px;right:20px;width:380px;max-height:340px;overflow-y:auto;background:var(--bg);border:1px solid var(--sep);border-radius:12px;box-shadow:0 12px 40px rgba(0,0,0,.1);z-index:60}
.search-drop.visible{display:block}
.sr{display:block;padding:10px 14px;border-bottom:1px solid var(--sep);text-decoration:none;color:inherit;font-size:12px}
.sr:last-child{border-bottom:none}
.sr:hover{background:var(--bg2)}
.sr-top{display:flex;align-items:center;gap:6px;margin-bottom:2px}
.sr-hex{font-family:'DM Mono',monospace;font-size:10px;color:var(--purple)}
.sr-mission{font-size:11px;color:var(--text2);font-weight:500}
.sr-time{margin-left:auto;font-family:'DM Mono',monospace;font-size:9px;color:var(--text3)}
.sr-text{font-size:12px;color:var(--text2);line-height:1.4}
.sr-text mark{background:rgba(139,92,246,.2);border-radius:2px;padding:0 2px}
.sr-empty{padding:16px;text-align:center;color:var(--text3);font-size:12px}

@media(max-width:1000px){
  .kanban{gap:8px}
  .column.backlog-col{width:140px}
}
@media(max-width:800px){
  .kanban{grid-template-columns:auto 1fr 1fr;gap:8px}
  .column[data-status="done"]{display:none}
}
@media(max-width:600px){
  .kanban{grid-template-columns:1fr;gap:6px}
  .column.backlog-col{width:100%}
  .column.backlog-col.collapsed{width:100%;height:40px;min-height:40px}
  .column.backlog-col.collapsed .col-header{flex-direction:row}
  .column.backlog-col.collapsed .col-name{writing-mode:horizontal-tb;transform:none}
}

/* ── Workstream Settings Modal ── */
.ws-settings-btn{position:fixed;bottom:24px;right:24px;width:40px;height:40px;border-radius:50%;background:var(--bg);border:1px solid var(--sep);box-shadow:0 2px 8px rgba(0,0,0,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:60;transition:all .2s;color:var(--text3)}
.ws-settings-btn:hover{background:var(--surface);color:var(--text);box-shadow:0 4px 16px rgba(0,0,0,.15);transform:scale(1.05)}
.ws-settings-btn svg{width:18px;height:18px}
.ws-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:70;opacity:0;pointer-events:none;transition:opacity .2s;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.ws-modal-bg.open{opacity:1;pointer-events:all}
.ws-modal{width:520px;max-height:80vh;background:var(--bg);border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.15);display:flex;flex-direction:column;transform:scale(.95);opacity:0;transition:all .25s cubic-bezier(.4,0,.2,1)}
.ws-modal-bg.open .ws-modal{transform:scale(1);opacity:1}
.ws-modal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 16px}
.ws-modal-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:700;letter-spacing:-0.03em}
.ws-modal-sub{font-size:12px;color:var(--text3);font-weight:400;margin-left:8px}
.ws-modal-close{width:30px;height:30px;border-radius:8px;border:none;background:none;cursor:pointer;color:var(--text3);display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .15s}
.ws-modal-close:hover{background:var(--surface);color:var(--text)}
.ws-modal-body{overflow-y:auto;padding:0 24px 16px;flex:1}
.ws-section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);padding:8px 0 6px;margin-top:4px}
.ws-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;transition:background .15s;margin-bottom:2px}
.ws-row:hover{background:var(--surface)}
.ws-color-swatch{width:28px;height:28px;border-radius:8px;border:2px solid rgba(0,0,0,.06);cursor:pointer;flex-shrink:0;position:relative;transition:transform .15s}
.ws-color-swatch:hover{transform:scale(1.1);border-color:rgba(0,0,0,.15)}
.ws-color-swatch input[type="color"]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.ws-name-input{border:none;background:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;color:var(--text);flex:1;min-width:0;padding:4px 8px;border-radius:6px;transition:all .15s}
.ws-name-input:focus{outline:none;background:var(--surface);box-shadow:0 0 0 2px rgba(139,92,246,.15)}
.ws-ctx-badge{font-size:10px;font-weight:600;padding:3px 10px;border-radius:6px;text-transform:uppercase;letter-spacing:.04em;flex-shrink:0;cursor:pointer;transition:all .15s;border:1px solid transparent;min-width:52px;text-align:center}
.ws-ctx-badge:hover{border-color:rgba(0,0,0,.12);transform:scale(1.03)}
.ws-ctx-home{background:rgba(34,197,94,.1);color:#16a34a}
.ws-ctx-work{background:rgba(59,130,246,.1);color:#2563eb}
.ws-ctx-shared{background:rgba(139,92,246,.1);color:#7c3aed}
.ws-delete-btn{width:28px;height:28px;border-radius:6px;border:none;background:none;cursor:pointer;color:var(--text3);display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .15s;flex-shrink:0;opacity:0}
.ws-row:hover .ws-delete-btn{opacity:1}
.ws-delete-btn:hover{background:rgba(239,68,68,.1);color:var(--rose)}
.ws-add-row{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px;border-radius:10px;border:1px dashed var(--sep);cursor:pointer;color:var(--text3);font-size:13px;font-weight:500;transition:all .15s;margin-top:10px}
.ws-add-row:hover{border-color:var(--purple);color:var(--purple);background:rgba(139,92,246,.03)}
.ws-modal-footer{padding:12px 24px;border-top:1px solid var(--sep);font-size:11px;color:var(--text3);text-align:center}
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-dot"></div><div class="logo-text">Mission Control</div></div>
  <nav class="header-nav">
    <a href="/" class="nav-link">Dashboard</a>
    <a href="/dispatch" class="nav-link active">Dispatch</a>
    <a href="/findings" class="nav-link">Findings</a>
    <a href="/workflow" class="nav-link">Workflow</a>
    <a href="/postmortems" class="nav-link">Post-Mortems</a>
    <a href="/tools" class="nav-link">Toolbox</a>
    <a href="/logic" class="nav-link">Logic</a>
    <a href="/radar" class="nav-link">Radar</a>

<!-- Detail Modal -->

    <div id="modalBar" class="modal-bar"></div>

<!-- Add/Edit Form -->
<div class="form-bg" id="formBg">
  <div class="form-card">
    <div class="form-header">
      <h2 id="formTitle">New Work Item</h2>
      <p id="formSub">Add a task, idea, or priority</p>

    <div class="form-body">

      </div>
      <div class="fg">

<!-- Workstream Settings Button -->

  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>

<!-- Workstream Settings Modal (centered) -->
<div class="ws-modal-bg" id="wsPanelBg">
  <div class="ws-modal">
    <div class="ws-modal-header">
      <div><span class="ws-modal-title">Workstreams</span><span class="ws-modal-sub">Manage across all pages</span></div>
      <button class="ws-modal-close" id="wsPanelClose">&times;</button>
    </div>
    <div class="ws-modal-body" id="wsPanelBody"></div>
    <div class="ws-modal-footer">Changes save instantly and sync to Dispatch + Dashboard.</div>
