<script>
let items = [], workstreams = [], areasConfig = { home: [], work: [] }, activeWs = 'all', activePri = 'all', activeArea = 'all', searchTimeout = null;
let activeDescEditor = null; // Custom editor textarea reference
function destroyDescEditor() { activeDescEditor = null; }
function currentMode() { return (window.__getMode && window.__getMode()) || localStorage.getItem('mc-mode') || 'home'; }

const STATUSES = ['backlog', 'todo', 'in-progress', 'done'];
const STATUS_LABELS = { 'in-progress': 'In Progress', todo: 'Todo', backlog: 'Backlog', done: 'Done' };
const STATUS_DOTS = { 'in-progress': 'ip', todo: 'todo', backlog: 'backlog', done: 'done' };
let backlogCollapsed = false, doneCollapsed = false;

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function wsColor(id) { const w = workstreams.find(w => w.id === id); return w ? w.color : '#9ca3af'; }
function wsName(id) { const w = workstreams.find(w => w.id === id); return w ? w.name : ''; }

// Resolve workstream — from workstream field, then try matching tags to workstream IDs
function resolveWs(item) {
  if (item.workstream) {
    const ws = workstreams.find(w => w.id === item.workstream);
    if (ws) return { name: ws.name, color: ws.color, tint: colorToTint(ws.color) };
    // Workstream field set but not in our list — show the raw value
    return { name: item.workstream, color: '#9ca3af', tint: 'ws-other' };
  }
  // Try matching tags to workstream IDs (e.g., tag "cares" → CARES workstream)
  const tags = (item.tags || []).map(t => t.toLowerCase());
  for (const ws of workstreams) {
    if (tags.includes(ws.id)) return { name: ws.name, color: ws.color, tint: colorToTint(ws.color) };
  }
  return { name: '', color: '#9ca3af', tint: 'ws-other' };
}

// Auto-detect which area a dispatch item relates to — config-driven per mode
function inferAreas(item) {
  const text = (item.title || '') + ' ' + ((item.tags || []).join(' '));
  const areas = [];
  const seen = new Set();
  function add(id, name, icon, color) { if (!seen.has(id)) { seen.add(id); areas.push({ id, name, icon: icon || '', color: color || '#71717a', cls: 'area-' + id }); } }

  // Use both home and work areas for inference (items may match either)
  const allAreas = [...(areasConfig.home || []), ...(areasConfig.work || [])];
  const uniqueAreas = [];
  const seenIds = new Set();
  allAreas.forEach(a => { if (!seenIds.has(a.id)) { seenIds.add(a.id); uniqueAreas.push(a); } });

  uniqueAreas.forEach(a => {
    if (a.pattern) {
      try { if (new RegExp(a.pattern, 'i').test(text)) add(a.id, a.name, a.icon, a.color); } catch {}
    }
  });

  return areas.slice(0, 3); // max 3 tags per card
}

// Generate inline style for area tags using color from config
function areaStyle(color) {
  const c = color || '#71717a';
  // Parse hex to rgb for alpha background
  const r = parseInt(c.slice(1,3),16), g = parseInt(c.slice(3,5),16), b = parseInt(c.slice(5,7),16);
  return 'background:rgba('+r+','+g+','+b+',0.1);color:'+c;
}

// Get areas for an item — use saved areas field if set, otherwise auto-detect
function getItemAreas(item) {
  if (item.areas && item.areas.length > 0) {
    const allA = [...(areasConfig.home || []), ...(areasConfig.work || [])];
    const lookup = {}; allA.forEach(a => { if (!lookup[a.id]) lookup[a.id] = a; });
    return item.areas.map(id => lookup[id]).filter(Boolean).map(a => ({ id: a.id, name: a.name, icon: a.icon || '', color: a.color || '#71717a', cls: 'area-' + a.id }));
  }
  return inferAreas(item);
}

// Get areas for current mode (for filter bar display)
function modeAreas() {
  const mode = currentMode();
  // Show areas from current mode. Shared (MC) items use home areas.
  return areasConfig[mode] || areasConfig.home || [];
}

// Collapsed workstream groups (persisted in sessionStorage)
const collapsedWsGroups = new Set(JSON.parse(sessionStorage.getItem('mc-collapsed-ws') || '[]'));
function toggleWsGroup(e, key) {
  e.stopPropagation();
  const group = document.querySelector(`.ws-group[data-ws-key="${key}"]`);
  if (!group) return;
  if (collapsedWsGroups.has(key)) {
    collapsedWsGroups.delete(key);
    group.classList.remove('collapsed');
  } else {
    collapsedWsGroups.add(key);
    group.classList.add('collapsed');
  }
  sessionStorage.setItem('mc-collapsed-ws', JSON.stringify([...collapsedWsGroups]));
}

// ── Workstream group reorder (grip handle custom drag) ──────────────────
let gripDragState = null;

function startGripDrag(e) {
  e.stopPropagation();
  e.preventDefault();
  const grip = e.currentTarget;
  const label = grip.closest('.ws-group-label');
  const group = grip.closest('.ws-group');
  if (!group || !label) return;

  const colBody = group.closest('.col-body');
  const siblings = Array.from(colBody.querySelectorAll('.ws-group[data-ws-name]'));
  if (siblings.length < 2) return;

  const labelRect = label.getBoundingClientRect();
  const offsetY = e.clientY - labelRect.top;

  gripDragState = {
    group, colBody, siblings, offsetY, startY: e.clientY, moved: false, ghost: null, dropLine: null
  };

  document.addEventListener('mousemove', onGripMove);
  document.addEventListener('mouseup', onGripUp);
  document.addEventListener('keydown', onGripEscape);
}

function onGripMove(e) {
  const s = gripDragState;
  if (!s) return;

  // Deadzone — 4px before starting
  if (!s.moved && Math.abs(e.clientY - s.startY) < 4) return;

  if (!s.moved) {
    s.moved = true;
    s.group.classList.add('ws-custom-dragging');

    // Create ghost from label
    const label = s.group.querySelector('.ws-group-label');
    const rect = label.getBoundingClientRect();
    const ghost = document.createElement('div');
    ghost.className = 'ws-drag-ghost';
    const tint = s.group.classList.contains('ws-purple') ? 'rgba(139,92,246,0.12)' :
                 s.group.classList.contains('ws-amber') ? 'rgba(245,158,11,0.12)' :
                 s.group.classList.contains('ws-green') ? 'rgba(34,197,94,0.12)' :
                 s.group.classList.contains('ws-blue') ? 'rgba(59,130,246,0.12)' : 'rgba(0,0,0,0.06)';
    const dot = label.querySelector('.dot');
    const dotColor = dot ? dot.style.background : '#999';
    ghost.innerHTML = `<span style="width:7px;height:7px;border-radius:50%;background:${dotColor};flex-shrink:0"></span>${s.group.dataset.wsName === '_other' ? 'Other' : s.group.dataset.wsName}`;
    ghost.style.background = `linear-gradient(135deg, #fff, ${tint})`;
    ghost.style.border = '1px solid rgba(0,0,0,0.08)';
    ghost.style.width = rect.width + 'px';
    ghost.style.color = 'var(--text)';
    ghost.style.fontFamily = "'DM Sans', sans-serif";
    ghost.style.opacity = '0';
    document.body.appendChild(ghost);
    requestAnimationFrame(() => { ghost.style.opacity = '0.95'; });
    s.ghost = ghost;
  }

  // Move ghost — pinned right at cursor (account for html zoom)
  if (s.ghost) {
    const z = parseFloat(getComputedStyle(document.documentElement).zoom) || 1;
    s.ghost.style.left = (e.clientX / z + 12) + 'px';
    s.ghost.style.top = (e.clientY / z - 14) + 'px';
  }

  // Find drop position + highlight target
  if (s.dropLine) { s.dropLine.remove(); s.dropLine = null; }
  s.colBody.querySelectorAll('.ws-drop-target').forEach(g => g.classList.remove('ws-drop-target'));

  const otherGroups = s.siblings.filter(g => g !== s.group);
  let insertBefore = null;
  let hoverTarget = null;
  for (const g of otherGroups) {
    const gLabel = g.querySelector('.ws-group-label');
    if (!gLabel) continue;
    const r = gLabel.getBoundingClientRect();
    const mid = r.top + r.height / 2;
    if (e.clientY >= r.top && e.clientY <= r.bottom) hoverTarget = g;
    if (e.clientY < mid) { insertBefore = g; break; }
  }

  // Highlight the group you're hovering over
  if (hoverTarget) hoverTarget.classList.add('ws-drop-target');

  // Show drop line
  const line = document.createElement('div');
  line.className = 'ws-drop-line';
  if (insertBefore) {
    s.colBody.insertBefore(line, insertBefore);
  } else {
    const last = otherGroups[otherGroups.length - 1];
    if (last && last.nextSibling) s.colBody.insertBefore(line, last.nextSibling);
    else s.colBody.appendChild(line);
  }
  s.dropLine = line;
  s.insertBefore = insertBefore;
}

function onGripUp(e) {
  const s = gripDragState;
  cleanup();
  if (!s || !s.moved) return;

  // Perform reorder
  if (s.insertBefore) {
    s.colBody.insertBefore(s.group, s.insertBefore);
  } else {
    s.colBody.appendChild(s.group);
  }

  // Save order
  const status = s.group.dataset.wsStatus;
  const newGroups = s.colBody.querySelectorAll('.ws-group[data-ws-name]');
  const order = Array.from(newGroups).map(g => g.dataset.wsName);
  sessionStorage.setItem('mc-ws-order-' + status, JSON.stringify(order));
}

function onGripEscape(e) {
  if (e.key === 'Escape') cleanup();
}

function cleanup() {
  const s = gripDragState;
  if (!s) return;
  s.group.classList.remove('ws-custom-dragging');
  s.colBody.querySelectorAll('.ws-drop-target').forEach(g => g.classList.remove('ws-drop-target'));
  if (s.ghost) { s.ghost.style.opacity = '0'; setTimeout(() => s.ghost?.remove(), 100); }
  if (s.dropLine) s.dropLine.remove();
  document.removeEventListener('mousemove', onGripMove);
  document.removeEventListener('mouseup', onGripUp);
  document.removeEventListener('keydown', onGripEscape);
  gripDragState = null;
}

// Map color to tint class — generate dynamic tint from any hex color
function colorToTint(c) {
  if (!c || c === '#9ca3af') return 'ws-other';
  if (c.includes('8b5cf6')) return 'ws-purple';
  if (c.includes('3b82f6')) return 'ws-blue';
  if (c.includes('22c55e')) return 'ws-green';
  if (c.includes('f59e0b')) return 'ws-amber';
  return 'ws-dynamic';
}

// Generate inline styles for ws-group containers with custom colors
function wsDynamicStyle(hex) {
  if (!hex || !hex.startsWith('#')) return '';
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return 'background:rgba('+r+','+g+','+b+',0.04);border:1px solid rgba('+r+','+g+','+b+',0.08)';
}

// Generate inline styles for ws pill badges with any color
function wsPillStyle(hex) {
  if (!hex || !hex.startsWith('#')) return '';
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return 'background:rgba('+r+','+g+','+b+',0.12);color:'+hex;
}

function render() {
  const mode = currentMode();
  // Filter by context: check item context AND workstream context
  let filtered = items.filter(i => {
    if (i.status === 'archived') return false;
    // If item has explicit context, respect it
    if (i.context !== null && i.context !== undefined) return i.context === mode;
    // Item context is null/shared — check if its workstream locks it to a mode
    if (i.workstream) {
      const ws = workstreams.find(w => w.id === i.workstream);
      if (ws && ws.context !== null && ws.context !== undefined) return ws.context === mode;
    }
    // Also check tag-based workstream resolution
    const tags = (i.tags || []).map(t => t.toLowerCase());
    for (const ws of workstreams) {
      if (tags.includes(ws.id) && ws.context !== null && ws.context !== undefined) return ws.context === mode;
    }
    // Truly shared — show in both modes
    return true;
  });
  // Filter workstreams to current mode + shared (null context)
  const modeWorkstreams = workstreams.filter(ws => ws.context === null || ws.context === undefined || ws.context === mode);
  if (activeWs !== 'all') filtered = filtered.filter(i => i.workstream === activeWs);
  if (activePri !== 'all') filtered = filtered.filter(i => (i.priority || 'p2') === activePri);
  if (activeArea !== 'all') filtered = filtered.filter(i => getItemAreas(i).some(a => a.id === activeArea));

  const total = filtered.length;
  const p0c = filtered.filter(i => i.priority === 'p0' && i.status !== 'done').length;
  const ipc = filtered.filter(i => i.status === 'in-progress').length;
  const donec = filtered.filter(i => i.status === 'done').length;

  // Title row with meaningful stats
  const todoc = filtered.filter(i => i.status === 'todo').length;
  const blc = filtered.filter(i => i.status === 'backlog').length;
  let tr = `<h1>Dispatch</h1>`;
  if (p0c > 0) tr += `<span class="t-stat"><strong class="rose">${p0c} critical</strong></span>`;
  tr += `<span class="t-stat"><strong class="blue">${ipc}</strong> in progress</span>`;
  tr += `<span class="t-stat"><strong>${todoc}</strong> to do</span>`;
  tr += `<span class="t-stat"><strong class="green">${donec}</strong> done</span>`;
  document.getElementById('titleRow').innerHTML = tr;

  // Filter bar — show workstreams for current mode
  let fb = `<span class="filter-label">Workstream</span>`;
  fb += `<div class="f-pill${activeWs === 'all' ? ' active' : ''}" data-ws="all">All</div>`;
  modeWorkstreams.forEach(ws => {
    fb += `<div class="f-pill${activeWs === ws.id ? ' active' : ''}" data-ws="${esc(ws.id)}"><span class="dot" style="background:${esc(ws.color)}"></span>${esc(ws.name)}</div>`;
  });
  fb += `<span class="filter-label" style="margin-left:12px">Priority</span>`;
  fb += `<div class="f-pill${activePri === 'all' ? ' active' : ''}" data-pri="all">All</div>`;
  fb += `<div class="f-pill${activePri === 'p0' ? ' active' : ''}" data-pri="p0"><span class="dot" style="background:var(--rose)"></span>P0</div>`;
  fb += `<div class="f-pill${activePri === 'p1' ? ' active' : ''}" data-pri="p1"><span class="dot" style="background:var(--amber)"></span>P1</div>`;
  fb += `<div class="f-pill${activePri === 'p2' ? ' active' : ''}" data-pri="p2"><span class="dot" style="background:var(--blue)"></span>P2</div>`;
  // Area filter — only show areas from current mode's config that have matching items
  const modeAreaList = areasConfig[mode] || [];
  const modeAreaIds = new Set(modeAreaList.map(a => a.id));
  const presentAreas = new Map();
  filtered.forEach(i => { getItemAreas(i).forEach(a => { if (modeAreaIds.has(a.id) && !presentAreas.has(a.id)) presentAreas.set(a.id, a); }); });
  if (presentAreas.size > 0) {
    fb += `<span class="filter-label" style="margin-left:12px">Area</span>`;
    fb += `<div class="f-pill${activeArea === 'all' ? ' active' : ''}" data-area="all">All</div>`;
    for (const [id, a] of presentAreas) {
      fb += `<div class="f-pill${activeArea === id ? ' active' : ''}" data-area="${esc(id)}"><span style="font-size:11px">${a.icon}</span>${esc(a.name)}</div>`;
    }
  }
  if (activeWs !== 'all' || activePri !== 'all' || activeArea !== 'all') {
    fb += `<div class="f-pill" data-clear="1" style="color:var(--rose);border-color:var(--rose);margin-left:6px">Clear</div>`;
  }
  fb += `<button class="add-btn" id="addBtn">+ Add</button>`;
  document.getElementById('filterBar').innerHTML = fb;

  // Bind filter clicks
  document.querySelectorAll('.f-pill[data-ws]').forEach(el => {
    el.addEventListener('click', () => { activeWs = el.dataset.ws; render(); });
  });
  document.querySelectorAll('.f-pill[data-pri]').forEach(el => {
    el.addEventListener('click', () => { activePri = el.dataset.pri; render(); });
  });
  document.querySelectorAll('.f-pill[data-area]').forEach(el => {
    el.addEventListener('click', () => { activeArea = el.dataset.area; render(); });
  });
  document.querySelectorAll('.f-pill[data-clear]').forEach(el => {
    el.addEventListener('click', () => { activeWs = 'all'; activePri = 'all'; activeArea = 'all'; render(); });
  });
  const addBtn = document.getElementById('addBtn');
  if (addBtn) addBtn.addEventListener('click', () => openForm());

  // Kanban columns
  let h = '';
  STATUSES.forEach(status => {
    const colItems = filtered.filter(i => i.status === status);
    const isBacklog = status === 'backlog';
    const isDone = status === 'done';
    let colCls = 'column';
    if (isBacklog) colCls = 'column backlog-col' + (backlogCollapsed ? ' collapsed' : '');
    else if (isDone) colCls = 'column done-col' + (doneCollapsed ? ' collapsed' : '');
    const toggleAttr = isBacklog ? ' data-toggle="backlog"' : isDone ? ' data-toggle="done"' : '';
    const chevron = (isBacklog || isDone) ? '<span class="chevron">&#9660;</span>' : '';
    h += `<div class="${colCls}" data-status="${status}">`;
    h += `<div class="col-header"${toggleAttr}><span class="col-dot ${STATUS_DOTS[status]}"></span><span class="col-name">${STATUS_LABELS[status]}</span>${chevron}<span class="col-count">${colItems.length}</span></div>`;
    h += `<div class="col-body" data-status="${status}">`;

    // Sort by sortOrder (if set), then by created date
    colItems.sort((a, b) => {
      const ao = a.sortOrder != null ? a.sortOrder : 9999;
      const bo = b.sortOrder != null ? b.sortOrder : 9999;
      if (ao !== bo) return ao - bo;
      return new Date(a.created || 0) - new Date(b.created || 0);
    });

    if (colItems.length === 0) {
      h += `<div class="col-empty">No items</div>`;
    } else {
      // Only group by workstream in Todo and Backlog columns
      const useGroups = (status === 'todo' || status === 'backlog');

      function renderCard(item) {
        const pri = item.priority || 'p2';
        const priCls = ` ${pri}`;
        const ws = resolveWs(item);
        const dateStr = item.created ? new Date(item.created).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '';
        const areas = getItemAreas(item);
        let c = `<div class="k-card${priCls}" draggable="true" data-id="${esc(item.id)}">`;
        c += `<div class="k-bar"></div><div class="k-inner"><div class="k-labels">`;
        c += `<span class="k-ws-pill" style="${wsPillStyle(ws.color)}"><span class="dot" style="background:${ws.color}"></span>${esc(ws.name || 'Other')}</span>`;
        if (dateStr) c += `<span class="k-date">${esc(dateStr)}</span>`;
        c += `</div><div class="k-title">${esc(item.title)}</div>`;
        if (areas.length > 0) {
          c += `<div class="k-areas">`;
          areas.forEach(a => { c += `<span class="k-area-tag" style="${areaStyle(a.color)}"><span class="area-icon">${a.icon}</span>${esc(a.name)}</span>`; });
          c += `</div>`;
        }
        c += `</div></div>`;
        return c;
      }

      if (useGroups) {
        const groups = {};
        colItems.forEach(item => {
          const ws = resolveWs(item);
          const key = ws.name || '_other';
          if (!groups[key]) groups[key] = { name: ws.name, color: ws.color, tint: ws.tint, items: [] };
          groups[key].items.push(item);
        });
        const orderKey = 'mc-ws-order-' + status;
        const savedOrder = JSON.parse(sessionStorage.getItem(orderKey) || '[]');
        const sorted = Object.entries(groups).sort((a, b) => {
          const ai = savedOrder.indexOf(a[0]);
          const bi = savedOrder.indexOf(b[0]);
          if (ai !== -1 && bi !== -1) return ai - bi;
          if (ai !== -1) return -1;
          if (bi !== -1) return 1;
          if (a[0] === '_other') return 1;
          if (b[0] === '_other') return -1;
          return a[0].localeCompare(b[0]);
        });
        for (const [key, group] of sorted) {
          const showLabel = sorted.length > 1 || key !== '_other';
          const colWsKey = status + '__' + key;
          const isCollapsed = collapsedWsGroups.has(colWsKey);
          const groupStyle = group.tint === 'ws-dynamic' ? wsDynamicStyle(group.color) : '';
          h += `<div class="ws-group ${group.tint}${isCollapsed ? ' collapsed' : ''}" data-ws-key="${esc(colWsKey)}" data-ws-name="${esc(key)}" data-ws-status="${esc(status)}"${groupStyle ? ' style="'+groupStyle+'"' : ''}>`;
          if (showLabel && sorted.length > 1) {
            h += `<div class="ws-group-label" onclick="toggleWsGroup(event,'${esc(colWsKey)}')">`;
            h += `<span class="ws-grip" onmousedown="startGripDrag(event)" title="Drag to reorder"><svg width="6" height="10" viewBox="0 0 6 10" fill="currentColor"><circle cx="1.5" cy="1.5" r="1"/><circle cx="4.5" cy="1.5" r="1"/><circle cx="1.5" cy="5" r="1"/><circle cx="4.5" cy="5" r="1"/><circle cx="1.5" cy="8.5" r="1"/><circle cx="4.5" cy="8.5" r="1"/></svg></span>`;
            h += `<span class="dot" style="background:${group.color}"></span>${esc(group.name || 'Other')}<span class="ws-group-count">${group.items.length}</span>`;
            h += `<span class="ws-chevron">\u25BC</span></div>`;
          } else if (showLabel) {
            h += `<div class="ws-group-label" onclick="toggleWsGroup(event,'${esc(colWsKey)}')"><span class="dot" style="background:${group.color}"></span>${esc(group.name || 'Other')}<span class="ws-group-count">${group.items.length}</span><span class="ws-chevron">\u25BC</span></div>`;
          }
          h += `<div class="ws-group-cards">`;
          // Sort items within group: P0 first, then P1, P2, P3
          const priOrder = { p0: 0, p1: 1, p2: 2, p3: 3 };
          group.items.sort((a, b) => (priOrder[a.priority] || 2) - (priOrder[b.priority] || 2));
          group.items.forEach(item => { h += renderCard(item); });
          h += `</div></div>`;
        }
      } else {
        // Flat list — no workstream grouping
        h += `<div class="ws-group-cards">`;
        colItems.forEach(item => { h += renderCard(item); });
        h += `</div>`;
      }
    }
    h += `</div></div>`;
  });
  document.getElementById('kanban').innerHTML = h;

  // Bind card events
  document.querySelectorAll('.k-card').forEach(card => {
    card.addEventListener('click', () => openDetail(card.dataset.id));
    card.addEventListener('dragstart', onDragStart);
    card.addEventListener('dragend', onDragEnd);
    // Dragover on cards for indicator positioning (but drop only on col-body to avoid double-fire)
    card.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      const colBody = getColBodyFromEvent(e);
      if (colBody) {
        colBody.classList.add('drag-over');
        showDropIndicator(colBody, e.clientY);
      }
    });
  });

  // Bind drop zones
  document.querySelectorAll('.col-body').forEach(zone => {
    zone.addEventListener('dragover', onDragOver);
    zone.addEventListener('dragleave', onDragLeave);
    zone.addEventListener('drop', onDrop);
  });

  // Group reorder is handled by grip handle custom drag (startGripDrag)

  // Collapse toggles — toggle both-collapsed when both side columns are collapsed
  const kanbanEl = document.getElementById('kanban');
  function updateBothCollapsed() {
    if (kanbanEl) kanbanEl.classList.toggle('both-collapsed', backlogCollapsed && doneCollapsed);
  }
  const blToggle = document.querySelector('[data-toggle="backlog"]');
  if (blToggle) {
    blToggle.addEventListener('click', () => {
      backlogCollapsed = !backlogCollapsed;
      const col = document.querySelector('.backlog-col');
      if (col) col.classList.toggle('collapsed', backlogCollapsed);
      updateBothCollapsed();
    });
  }
  const doneToggle = document.querySelector('[data-toggle="done"]');
  if (doneToggle) {
    doneToggle.addEventListener('click', () => {
      doneCollapsed = !doneCollapsed;
      const col = document.querySelector('.done-col');
      if (col) col.classList.toggle('collapsed', doneCollapsed);
      updateBothCollapsed();
    });
  }
}

// ── Drag & Drop (cross-column + intra-column reorder) ──
let draggedId = null;
function onDragStart(e) {
  draggedId = e.currentTarget.dataset.id;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', draggedId);
}
function onDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  draggedId = null;
  document.querySelectorAll('.col-body').forEach(el => el.classList.remove('drag-over'));
  document.querySelectorAll('.drop-indicator').forEach(el => el.remove());
}
function getColBodyFromEvent(e) {
  // Walk up from target to find the col-body
  let el = e.target;
  while (el && !el.classList.contains('col-body')) el = el.parentElement;
  return el;
}
function showDropIndicator(colBody, clientY) {
  document.querySelectorAll('.drop-indicator').forEach(el => el.remove());
  if (!colBody) return;
  const cards = [...colBody.querySelectorAll('.k-card:not(.dragging)')];
  let insertBefore = null;
  for (const card of cards) {
    const rect = card.getBoundingClientRect();
    if (clientY < rect.top + rect.height / 2) { insertBefore = card; break; }
  }
  const indicator = document.createElement('div');
  indicator.className = 'drop-indicator';
  if (insertBefore) {
    insertBefore.parentNode.insertBefore(indicator, insertBefore);
  } else if (cards.length > 0) {
    cards[cards.length - 1].after(indicator);
  } else {
    colBody.appendChild(indicator);
  }
}
function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const colBody = e.currentTarget.classList.contains('col-body') ? e.currentTarget : getColBodyFromEvent(e);
  if (colBody) {
    colBody.classList.add('drag-over');
    showDropIndicator(colBody, e.clientY);
  }
}
function onDragLeave(e) {
  if (!e.currentTarget.contains(e.relatedTarget)) {
    e.currentTarget.classList.remove('drag-over');
    e.currentTarget.querySelectorAll('.drop-indicator').forEach(el => el.remove());
  }
}
function onDrop(e) {
  e.preventDefault();
  const colBody = e.currentTarget.classList.contains('col-body') ? e.currentTarget : getColBodyFromEvent(e);
  if (!colBody) return;
  colBody.classList.remove('drag-over');
  document.querySelectorAll('.drop-indicator').forEach(el => el.remove());
  const newStatus = colBody.dataset.status;
  if (!draggedId || !newStatus) return;

  const cards = [...colBody.querySelectorAll('.k-card:not(.dragging)')];
  let insertIdx = cards.length;
  for (let i = 0; i < cards.length; i++) {
    const rect = cards[i].getBoundingClientRect();
    if (e.clientY < rect.top + rect.height / 2) { insertIdx = i; break; }
  }

  const cardIds = cards.map(c => c.dataset.id);
  const existIdx = cardIds.indexOf(draggedId);
  if (existIdx !== -1) {
    cardIds.splice(existIdx, 1);
    if (insertIdx > existIdx) insertIdx--;
  }
  cardIds.splice(insertIdx, 0, draggedId);

  const draggedItem = items.find(i => i.id === draggedId);
  const statusChanged = draggedItem && draggedItem.status !== newStatus;

  if (statusChanged) {
    updateItem(draggedId, { status: newStatus }).then(() => {
      fetch('/api/dispatch/reorder', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ orderedIds: cardIds })
      }).then(() => loadItems());
    });
  } else {
    fetch('/api/dispatch/reorder', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ orderedIds: cardIds })
    }).then(() => loadItems());
  }
}

// ── Detail Modal ──
let currentDetailId = null;
function renderDesc(text) {
  let h = esc(text);
  h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/`([^`]+)`/g, '<code>$1</code>');
  h = h.replace(/^## (.+)$/gm, '<div style="font-weight:700;font-size:14px;margin:12px 0 4px;color:var(--text)">$1</div>');
  h = h.replace(/^(\d+)\. (.+)$/gm, '<div style="padding-left:12px;margin:2px 0">$1. $2</div>');
  h = h.replace(/^- (.+)$/gm, '<div style="padding-left:12px;margin:2px 0">&bull; $1</div>');
  return h;
}
// Richer markdown preview for the editor preview pane
function renderDescPreview(text) {
  let h = esc(text);
  // Headings
  h = h.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  h = h.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  h = h.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // Code blocks
  h = h.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  // Inline
  h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/_(.+?)_/g, '<em>$1</em>');
  h = h.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Blockquotes
  h = h.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  // Lists
  h = h.replace(/^- (.+)$/gm, '<li>$1</li>');
  h = h.replace(/^(\d+)\. (.+)$/gm, '<li>$1. $2</li>');
  // Paragraphs (double newline)
  h = h.replace(/\n\n/g, '</p><p>');
  h = '<p>' + h + '</p>';
  h = h.replace(/<p><\/p>/g, '');
  // Single newlines to <br>
  h = h.replace(/\n/g, '<br>');
  return h;
}

function makeDropdown(id, fieldName, currentVal, options) {
  // options: [{value, label, color?}]
  const cur = options.find(o => o.value === currentVal) || options[0];
  let h = `<div class="m-dropdown" data-dropdown="${fieldName}" data-id="${esc(id)}">`;
  h += `<div class="m-dropdown-trigger">`;
  if (cur.color) h += `<span class="dot" style="background:${cur.color}"></span>`;
  h += `${esc(cur.label)}<span class="arrow">&#9660;</span></div>`;
  h += `<div class="m-dropdown-menu">`;
  options.forEach(o => {
    h += `<div class="m-dropdown-item${o.value === currentVal ? ' selected' : ''}" data-value="${esc(o.value)}">`;
    if (o.color) h += `<span class="dot" style="background:${o.color}"></span>`;
    h += `${esc(o.label)}</div>`;
  });
  h += `</div></div>`;
  return h;
}

function openDetail(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  currentDetailId = id;
  const pri = item.priority || 'p2';
  const ws = resolveWs(item);

  // Priority color bar
  document.getElementById('modalBar').className = 'modal-bar ' + pri;

  // Editable title (click to edit)
  document.getElementById('modalTop').innerHTML = `<div class="m-title" data-edit="title">${esc(item.title)}</div>`;

  // Body
  let body = '<div class="modal-layout"><div class="modal-main">';

  // Editable description (click to edit)
  body += '<div class="m-desc-section"><div class="m-desc-label">Description</div>';
  body += `<div class="m-desc-box" data-edit="description">`;
  if (item.description) {
    body += `<div class="m-desc">${renderDesc(item.description)}</div>`;
  } else {
    body += '<div class="m-desc-empty">Click to add a description...</div>';
  }
  body += '</div></div>';

  // Area tags — editable (use saved areas or fall back to auto-detected)
  const itemAreas = item.areas || inferAreas(item).map(a => a.id);
  const allAvailableAreas = [...(areasConfig.home || []), ...(areasConfig.work || [])];
  const uniqueAvail = []; const seenAvailIds = new Set();
  allAvailableAreas.forEach(a => { if (!seenAvailIds.has(a.id)) { seenAvailIds.add(a.id); uniqueAvail.push(a); } });

  body += '<div class="m-desc-section"><div class="m-desc-label">Areas</div><div class="m-areas" id="modalAreasWrap">';
  itemAreas.forEach(areaId => {
    const cfg = uniqueAvail.find(a => a.id === areaId);
    if (!cfg) return;
    body += `<span class="k-area-tag" style="${areaStyle(cfg.color)};font-size:11px;padding:4px 10px 4px 7px;gap:5px;cursor:pointer" data-remove-area="${esc(areaId)}" title="Click to remove"><span class="area-icon" style="font-size:12px">${cfg.icon}</span>${esc(cfg.name)}<span style="margin-left:4px;opacity:.5;font-size:10px">&times;</span></span>`;
  });
  // Add button
  const unusedAreas = uniqueAvail.filter(a => !itemAreas.includes(a.id));
  if (unusedAreas.length > 0) {
    body += `<span class="k-area-tag" style="background:var(--surface);color:var(--text3);font-size:11px;padding:4px 10px;cursor:pointer;border:1px dashed var(--sep)" id="addAreaBtn">+</span>`;
  }
  body += '</div></div>';

  body += '</div>'; // end main

  // Sidebar with custom dropdowns
  body += '<div class="modal-sidebar">';

  // Status dropdown
  const statusOpts = STATUSES.map(s => ({
    value: s,
    label: STATUS_LABELS[s],
    color: s === 'in-progress' ? 'var(--blue)' : s === 'todo' ? 'var(--amber)' : s === 'done' ? 'var(--green)' : 'var(--text3)'
  }));
  body += '<div class="m-field"><div class="m-field-label">Status</div>';
  body += makeDropdown(item.id, 'status', item.status, statusOpts);
  body += '</div>';

  // Priority dropdown
  const priOpts = [
    { value: 'p0', label: 'P0 Critical', color: 'var(--rose)' },
    { value: 'p1', label: 'P1 High', color: 'var(--amber)' },
    { value: 'p2', label: 'P2 Medium', color: 'var(--blue)' },
    { value: 'p3', label: 'P3 Low', color: 'var(--text3)' }
  ];
  body += '<div class="m-field"><div class="m-field-label">Priority</div>';
  body += makeDropdown(item.id, 'priority', pri, priOpts);
  body += '</div>';

  // Workstream dropdown — show mode-appropriate workstreams
  const mode = currentMode();
  const modalWsList = workstreams.filter(ws => ws.context === null || ws.context === undefined || ws.context === mode);
  const wsOpts = [{ value: '', label: 'None', color: '#9ca3af' }];
  modalWsList.forEach(w => wsOpts.push({ value: w.id, label: w.name, color: w.color }));
  body += '<div class="m-field"><div class="m-field-label">Workstream</div>';
  body += makeDropdown(item.id, 'workstream', item.workstream || '', wsOpts);
  body += '</div>';

  // Linked Session
  if (item.linkedSession) {
    body += '<div class="m-field"><div class="m-field-label">Session</div><div class="m-field-value">';
    body += `<a class="m-session-link" href="/session/${esc(item.linkedSession)}">${esc(item.linkedSession.slice(-8))}</a>`;
    body += '</div></div>';
  }

  // Dates
  body += '<div class="m-field"><div class="m-field-label">Dates</div><div class="m-dates">';
  if (item.created) body += `<span>Created ${new Date(item.created).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}</span>`;
  if (item.updated) body += `<span>Updated ${new Date(item.updated).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}</span>`;
  body += '</div></div>';

  body += '</div></div>'; // end sidebar + layout
  document.getElementById('modalBody').innerHTML = body;

  // Action bar
  const nextMap = { 'backlog': { label: 'Move to Todo', st: 'todo' }, 'todo': { label: 'Start', st: 'in-progress' }, 'in-progress': { label: 'Complete', st: 'done' }, 'done': { label: 'Reopen', st: 'todo' } };
  const next = nextMap[item.status] || { label: 'Move', st: 'todo' };
  let acts = `<button class="m-btn primary" data-action="advance" data-id="${esc(item.id)}" data-status="${next.st}">${next.label}</button>`;
  acts += `<div class="m-btn-group"><button class="m-btn danger" data-action="delete" data-id="${esc(item.id)}">Delete</button></div>`;
  document.getElementById('modalActions').innerHTML = acts;

  // ── Bind all interactions ──

  // Custom dropdowns
  document.querySelectorAll('.m-dropdown').forEach(dd => {
    const trigger = dd.querySelector('.m-dropdown-trigger');
    trigger.addEventListener('click', (e) => {
      e.stopPropagation();
      // Close other open dropdowns
      document.querySelectorAll('.m-dropdown.open').forEach(d => { if (d !== dd) d.classList.remove('open'); });
      dd.classList.toggle('open');
    });
    dd.querySelectorAll('.m-dropdown-item').forEach(opt => {
      opt.addEventListener('click', (e) => {
        e.stopPropagation();
        const field = dd.dataset.dropdown;
        const value = opt.dataset.value;
        dd.classList.remove('open');
        // Save any unsaved description editor content alongside the dropdown change
        const updates = { [field]: value };
        const editorTa = document.getElementById('desc-editor-ta');
        if (editorTa) updates.description = editorTa.value;
        updateItem(dd.dataset.id, updates);
        // Reopen with updated data after save
        setTimeout(() => { const fresh = items.find(i => i.id === dd.dataset.id); if (fresh) openDetail(fresh.id); }, 150);
      });
    });
  });
  // Close dropdowns on outside click
  const closeDropdowns = () => document.querySelectorAll('.m-dropdown.open').forEach(d => d.classList.remove('open'));
  document.getElementById('modalBody').addEventListener('click', closeDropdowns);

  // Inline title editing
  const titleEl = document.querySelector('[data-edit="title"]');
  if (titleEl) {
    titleEl.addEventListener('click', () => {
      const input = document.createElement('input');
      input.className = 'm-title-input';
      input.value = item.title;
      titleEl.replaceWith(input);
      input.focus();
      input.select();
      const save = () => {
        const v = input.value.trim();
        if (v && v !== item.title) { updateItem(id, { title: v }); }
        setTimeout(() => openDetail(id), 100);
      };
      input.addEventListener('blur', save);
      input.addEventListener('keydown', (e) => { if (e.key === 'Enter') input.blur(); if (e.key === 'Escape') { input.value = item.title; input.blur(); } });
    });
  }

  // Inline description editing — native textarea + markdown toolbar
  const descBox = document.querySelector('[data-edit="description"]');
  if (descBox) {
    descBox.addEventListener('click', () => {
      destroyDescEditor();
      const wrap = document.createElement('div');
      wrap.className = 'm-editor-wrap';
      // Toolbar
      const toolbar = document.createElement('div');
      toolbar.className = 'm-editor-toolbar';
      toolbar.innerHTML = `
        <button data-md="bold" title="Bold (Ctrl+B)"><b>B</b></button>
        <button data-md="italic" title="Italic (Ctrl+I)"><i>I</i></button>
        <button data-md="heading" title="Heading">H</button>
        <div class="tb-sep"></div>
        <button data-md="ul" title="Bullet list">&bull;</button>
        <button data-md="ol" title="Numbered list">1.</button>
        <div class="tb-sep"></div>
        <button data-md="code" title="Code">&lt;/&gt;</button>
        <button data-md="quote" title="Quote">&ldquo;</button>
        <div class="tb-sep"></div>
        <button data-md="preview" title="Toggle preview" id="previewToggle">&#9673;</button>`;
      wrap.appendChild(toolbar);
      // Textarea
      const ta = document.createElement('textarea');
      ta.className = 'm-editor-ta';
      ta.id = 'desc-editor-ta';
      ta.value = item.description || '';
      ta.placeholder = 'Write a description... (markdown supported)';
      wrap.appendChild(ta);
      // Preview pane (hidden by default)
      const preview = document.createElement('div');
      preview.className = 'm-editor-preview';
      preview.style.display = 'none';
      preview.id = 'desc-preview';
      wrap.appendChild(preview);
      // Actions
      const actions = document.createElement('div');
      actions.className = 'm-editor-actions';
      actions.innerHTML = '<button class="m-btn" id="descCancel">Cancel</button><button class="m-btn primary" id="descSave">Save</button>';
      wrap.appendChild(actions);
      descBox.replaceWith(wrap);
      activeDescEditor = ta;
      // Auto-resize textarea
      function autoResize() { ta.style.height = 'auto'; ta.style.height = Math.min(ta.scrollHeight, 300) + 'px'; }
      ta.addEventListener('input', autoResize);
      autoResize();
      ta.focus();
      ta.setSelectionRange(0, 0);
      // Toolbar actions — wrap selection or insert at cursor
      function mdAction(type) {
        const start = ta.selectionStart, end = ta.selectionEnd;
        const sel = ta.value.substring(start, end);
        let before = '', after = '', insert = '';
        if (type === 'bold') { before = '**'; after = '**'; insert = sel || 'bold text'; }
        else if (type === 'italic') { before = '_'; after = '_'; insert = sel || 'italic text'; }
        else if (type === 'heading') { before = '## '; insert = sel || 'Heading'; }
        else if (type === 'ul') { before = '- '; insert = sel || 'List item'; }
        else if (type === 'ol') { before = '1. '; insert = sel || 'List item'; }
        else if (type === 'code') { before = '\`'; after = '\`'; insert = sel || 'code'; }
        else if (type === 'quote') { before = '> '; insert = sel || 'Quote'; }
        else if (type === 'preview') {
          const pv = document.getElementById('desc-preview');
          const isVisible = pv.style.display !== 'none';
          pv.style.display = isVisible ? 'none' : 'block';
          ta.style.display = isVisible ? '' : 'none';
          document.getElementById('previewToggle').classList.toggle('active', !isVisible);
          if (!isVisible) pv.innerHTML = renderDescPreview(ta.value);
          return;
        }
        const newText = ta.value.substring(0, start) + before + insert + (after || '') + ta.value.substring(end);
        ta.value = newText;
        const cursorPos = start + before.length + insert.length;
        ta.setSelectionRange(start + before.length, cursorPos);
        ta.focus();
        autoResize();
      }
      toolbar.addEventListener('click', (e) => {
        const btn = e.target.closest('[data-md]');
        if (btn) mdAction(btn.dataset.md);
      });
      // Keyboard shortcuts
      ta.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 'b') { e.preventDefault(); mdAction('bold'); }
        if (e.ctrlKey && e.key === 'i') { e.preventDefault(); mdAction('italic'); }
      });
      // Save / Cancel
      document.getElementById('descSave').addEventListener('click', () => {
        const v = ta.value.trim();
        if (v !== (item.description || '')) { updateItem(id, { description: v }); }
        destroyDescEditor();
        setTimeout(() => openDetail(id), 150);
      });
      document.getElementById('descCancel').addEventListener('click', () => {
        destroyDescEditor();
        setTimeout(() => openDetail(id), 100);
      });
    });
  }


  // Area tag editing — remove on click
  document.querySelectorAll('[data-remove-area]').forEach(el => {
    el.addEventListener('click', async () => {
      const areaId = el.dataset.removeArea;
      const curAreas = item.areas || inferAreas(item).map(a => a.id);
      const newAreas = curAreas.filter(a => a !== areaId);
      await updateItem(item.id, { areas: newAreas });
      setTimeout(() => openDetail(item.id), 100);
    });
  });
  // Area tag editing — add via dropdown
  const addAreaBtn = document.getElementById('addAreaBtn');
  if (addAreaBtn) {
    addAreaBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      // Build a small dropdown of available areas
      const existing = document.getElementById('areaDropdown');
      if (existing) { existing.remove(); return; }
      const curAreas = item.areas || inferAreas(item).map(a => a.id);
      const allA = [...(areasConfig.home || []), ...(areasConfig.work || [])];
      const uniq = []; const seen = new Set();
      allA.forEach(a => { if (!seen.has(a.id) && !curAreas.includes(a.id)) { seen.add(a.id); uniq.push(a); } });
      if (uniq.length === 0) return;
      const dd = document.createElement('div');
      dd.id = 'areaDropdown';
      dd.style.cssText = 'position:absolute;background:var(--bg);border:1px solid var(--sep);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);padding:6px;z-index:80;max-height:200px;overflow-y:auto;min-width:160px';
      uniq.forEach(a => {
        const opt = document.createElement('div');
        opt.style.cssText = 'display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;transition:background .1s';
        opt.innerHTML = `<span style="font-size:13px">${a.icon}</span><span>${esc(a.name)}</span>`;
        opt.addEventListener('mouseenter', () => opt.style.background = 'var(--surface)');
        opt.addEventListener('mouseleave', () => opt.style.background = 'none');
        opt.addEventListener('click', async (ev) => {
          ev.stopPropagation();
          const cur = item.areas || inferAreas(item).map(x => x.id);
          await updateItem(item.id, { areas: [...cur, a.id] });
          dd.remove();
          setTimeout(() => openDetail(item.id), 100);
        });
        dd.appendChild(opt);
      });
      const wrap = document.getElementById('modalAreasWrap');
      wrap.style.position = 'relative';
      wrap.appendChild(dd);
      // Close on outside click
      const closer = (ev) => { if (!dd.contains(ev.target)) { dd.remove(); document.removeEventListener('click', closer); } };
      setTimeout(() => document.addEventListener('click', closer), 10);
    });
  }

  // Action buttons
  document.querySelectorAll('[data-action="advance"]').forEach(btn => {
    btn.addEventListener('click', () => { updateItem(btn.dataset.id, { status: btn.dataset.status }); closeDetail(); });
  });
  document.querySelectorAll('[data-action="delete"]').forEach(btn => {
    btn.addEventListener('click', () => { deleteItem(btn.dataset.id); closeDetail(); });
  });

  document.getElementById('detailModal').classList.add('open');
}

function closeDetail() {
  destroyDescEditor();
  document.getElementById('detailModal').classList.remove('open');
}

// ── Form ──
async function openForm() {
  // Create a blank item via API, then open it in the detail modal for inline editing
  try {
    const ws = activeWs !== 'all' ? activeWs : '';
    // Auto-tag context: MC workstream = shared (null), otherwise current mode
    const ctx = ws === 'mission-control' ? null : currentMode();
    const res = await fetch('/api/dispatch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title: 'Untitled', description: '', priority: 'p2', workstream: ws, tags: [], status: 'todo', context: ctx })
    });
    if (!res.ok) throw new Error('Failed to create');
    const data = await res.json();
    await loadItems();
    // Open the new item in detail modal, auto-focus title for editing
    openDetail(data.id);
    // Auto-click the title to start editing immediately
    setTimeout(() => {
      const titleEl = document.querySelector('[data-edit="title"]');
      if (titleEl) titleEl.click();
    }, 250);
  } catch (e) { alert('Failed to create item: ' + e.message); }
}
function closeForm() { document.getElementById('formBg').classList.remove('open'); }

// ── CRUD ──
async function loadItems() {
  try {
    const [dr, wr, ar] = await Promise.all([fetch('/api/dispatch'), fetch('/api/workstreams'), fetch('/api/areas')]);
    items = await dr.json();
    workstreams = await wr.json();
    areasConfig = await ar.json();
    render();
  } catch (e) {
    document.getElementById('kanban').innerHTML = `<div style="grid-column:1/-1;padding:60px;text-align:center;color:var(--rose)">Failed to load: ${esc(e.message)}</div>`;
  }
}

async function saveItem() {
  const editId = document.getElementById('f-edit-id').value;
  const title = document.getElementById('f-title').value.trim();
  const description = document.getElementById('f-desc').value.trim();
  const priority = document.getElementById('f-priority').value;
  const workstream = document.getElementById('f-workstream').value;
  const tags = document.getElementById('f-tags').value.split(',').map(t => t.trim()).filter(Boolean);
  const linkedSession = document.getElementById('f-session').value.trim() || null;
  if (!title) return;

  try {
    const url = editId ? '/api/dispatch/' + encodeURIComponent(editId) : '/api/dispatch';
    // Auto-tag new items with current mode context; MC workstream items are shared (null)
    const context = editId ? undefined : (workstream === 'mission-control' ? null : currentMode());
    const payload = { title, description, priority, workstream, tags, linkedSession };
    if (context !== undefined) payload.context = context;
    const res = await fetch(url, {
      method: editId ? 'PUT' : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error('Failed');
    closeForm();
    await loadItems();
  } catch (e) { alert(e.message); }
}

async function updateItem(id, updates) {
  try {
    const res = await fetch('/api/dispatch/' + encodeURIComponent(id), {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(updates)
    });
    if (!res.ok) throw new Error('Failed');
    await loadItems();
  } catch (e) { alert(e.message); }
}

async function deleteItem(id) {
  if (!confirm('Delete this item?')) return;
  try {
    const res = await fetch('/api/dispatch/' + encodeURIComponent(id), { method: 'DELETE' });
    if (!res.ok) throw new Error('Failed');
    await loadItems();
  } catch (e) { alert(e.message); }
}

// ── Search ──
const searchInput = document.getElementById('searchInput');
const searchDrop = document.getElementById('searchDrop');
searchInput.addEventListener('input', function() {
  clearTimeout(searchTimeout);
  const q = this.value.trim();
  if (q.length < 2) { searchDrop.classList.remove('visible'); return; }
  searchTimeout = setTimeout(() => doSearch(q), 250);
});
searchInput.addEventListener('focus', function() {
  if (searchDrop.children.length && this.value.trim().length >= 2) searchDrop.classList.add('visible');
});
document.addEventListener('click', function(e) {
  if (!e.target.closest('.header-right') && !e.target.closest('.search-drop')) searchDrop.classList.remove('visible');
});

async function doSearch(q) {
  try {
    const res = await fetch('/api/search/prompts?q=' + encodeURIComponent(q) + '&limit=15');
    const data = await res.json();
    let h = '';
    if (!data.results?.length) {
      h = '<div class="sr-empty">No results</div>';
    } else {
      data.results.forEach(r => {
        const hl = hlMatch(r.prompt, q);
        const time = new Date(r.ts).toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        h += `<a class="sr" href="/session/${esc(r.sessionId)}"><div class="sr-top"><span class="sr-hex">${esc(r.sessionId.slice(-6))}</span>${r.mission ? '<span class="sr-mission">' + esc(r.mission) + '</span>' : ''}<span class="sr-time">${esc(time)}</span></div><div class="sr-text">${hl}</div></a>`;
      });
    }
    searchDrop.innerHTML = h;
    searchDrop.classList.add('visible');
  } catch {
    searchDrop.innerHTML = '<div class="sr-empty">Error</div>';
    searchDrop.classList.add('visible');
  }
}
function hlMatch(t, q) {
  const e = esc(t.slice(0, 200)), qe = esc(q);
  const i = e.toLowerCase().indexOf(qe.toLowerCase());
  if (i === -1) return e;
  return e.slice(0, i) + '<mark>' + e.slice(i, i + qe.length) + '</mark>' + e.slice(i + qe.length);
}

const CTX_CYCLE = [null, 'home', 'work'];
const CTX_LABELS = { null: 'Shared', home: 'Home', work: 'Work' };
const CTX_CLASS = { null: 'ws-ctx-shared', home: 'ws-ctx-home', work: 'ws-ctx-work' };

function renderWsPanel() {
  let h = '';
  const sorted = [...workstreams].sort((a, b) => (a.order || 0) - (b.order || 0));

  // Group by context
  const shared = sorted.filter(ws => ws.context === null || ws.context === undefined);
  const home = sorted.filter(ws => ws.context === 'home');
  const work = sorted.filter(ws => ws.context === 'work');

  function renderGroup(label, list) {
    if (list.length === 0 && label !== 'Shared') return '';
    let g = `<div class="ws-section-label">${label}</div>`;
    list.forEach(ws => {
      const ctx = ws.context === undefined ? null : ws.context;
      const ctxLabel = CTX_LABELS[ctx] || 'Shared';
      const ctxCls = CTX_CLASS[ctx] || 'ws-ctx-shared';
      g += `<div class="ws-row" data-ws-id="${esc(ws.id)}">`;
      g += `<div class="ws-color-swatch" style="background:${esc(ws.color)}"><input type="color" value="${esc(ws.color)}" data-ws-color="${esc(ws.id)}"></div>`;
      g += `<input class="ws-name-input" type="text" value="${esc(ws.name)}" data-ws-name="${esc(ws.id)}" spellcheck="false">`;
      g += `<span class="ws-ctx-badge ${ctxCls}" data-ws-ctx="${esc(ws.id)}" title="Click to cycle: Shared / Home / Work">${ctxLabel}</span>`;
      g += `<button class="ws-delete-btn" data-ws-del="${esc(ws.id)}" title="Delete">&times;</button>`;
      g += `</div>`;
    });
    return g;
  }

  h += renderGroup('Shared (visible everywhere)', shared);
  h += renderGroup('Home', home);
  h += renderGroup('Work', work);
  h += `<div class="ws-add-row" id="wsAddBtn">+ Add workstream</div>`;
  wsPanelBody.innerHTML = h;

  // Bind events
  wsPanelBody.querySelectorAll('[data-ws-color]').forEach(el => {
    el.addEventListener('input', async function() {
      const id = this.dataset.wsColor;
      this.parentElement.style.background = this.value;
      await wsUpdate(id, { color: this.value });
    });
  });
  wsPanelBody.querySelectorAll('[data-ws-name]').forEach(el => {
    let timeout;
    el.addEventListener('input', function() {
      clearTimeout(timeout);
      const id = this.dataset.wsName;
      const val = this.value.trim();
      timeout = setTimeout(() => { if (val) wsUpdate(id, { name: val }); }, 400);
    });
  });
  wsPanelBody.querySelectorAll('[data-ws-ctx]').forEach(el => {
    el.addEventListener('click', async function() {
      const id = this.dataset.wsCtx;
      const ws = workstreams.find(w => w.id === id);
      if (!ws) return;
      const cur = ws.context === undefined ? null : ws.context;
      const nextIdx = (CTX_CYCLE.indexOf(cur) + 1) % CTX_CYCLE.length;
      const next = CTX_CYCLE[nextIdx];
      await wsUpdate(id, { context: next });
    });
  });
  wsPanelBody.querySelectorAll('[data-ws-del]').forEach(el => {
    el.addEventListener('click', async function() {
      const id = this.dataset.wsDel;
      const ws = workstreams.find(w => w.id === id);
      if (!ws || !confirm('Delete workstream "' + ws.name + '"?')) return;
      await wsDelete(id);
    });
  });
  document.getElementById('wsAddBtn').addEventListener('click', async function() {
    const name = prompt('New workstream name:');
    if (!name || !name.trim()) return;
    const color = '#' + Math.floor(Math.random()*0xffffff).toString(16).padStart(6,'0');
    await wsAdd(name.trim(), color, currentMode() === 'work' ? 'work' : null);
  });
}

async function wsUpdate(id, updates) {
  try {
    const res = await fetch('/api/workstreams/' + encodeURIComponent(id), {
      method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(updates)
    });
    if (!res.ok) throw new Error('Failed');
    workstreams = await res.json();
    renderWsPanel();
    render();
  } catch (e) { alert(e.message); }
}

async function wsDelete(id) {
  try {
    const res = await fetch('/api/workstreams/' + encodeURIComponent(id), { method: 'DELETE' });
    if (!res.ok) throw new Error('Failed');
    workstreams = await res.json();
    renderWsPanel();
    render();
  } catch (e) { alert(e.message); }
}

async function wsAdd(name, color, context) {
  try {
    const res = await fetch('/api/workstreams', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, color, context })
    });
    if (!res.ok) throw new Error('Failed');
    workstreams = await res.json();
    renderWsPanel();
    render();
  } catch (e) { alert(e.message); }
}

// ── Init ──
loadItems();
</script>
