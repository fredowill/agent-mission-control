<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Toolbox &mdash; Mission Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box }
  :root {
    --bg:#ffffff; --bg-page:#f8f8f8; --surface:#f2f2f2; --surface2:#e8e8e8;
    --text:#1a1a1a; --text2:#555; --text3:#999; --sep:#e5e5e5;
    --green:#22c55e; --green-bg:rgba(34,197,94,0.08);
    --blue:#3b82f6; --blue-bg:rgba(59,130,246,0.08);
    --amber:#f59e0b; --amber-bg:rgba(245,158,11,0.08);
    --purple:#8b5cf6; --purple-bg:rgba(139,92,246,0.08);
    --rose:#ef4444; --rose-bg:rgba(239,68,68,0.06);
    --gray:#9ca3af;
    --cyan:#06b6d4; --cyan-bg:rgba(6,182,212,0.08);
  }
  body { background:var(--bg-page); color:var(--text); font-family:'DM Sans',-apple-system,system-ui,sans-serif; min-height:100vh; -webkit-font-smoothing:antialiased }

  /* Header */
  header { display:flex; align-items:center; justify-content:space-between; padding:0 clamp(24px,4vw,48px); height:64px; background:var(--bg); border-bottom:1px solid var(--sep); position:sticky; top:0; z-index:10 }
  .logo { display:flex; align-items:center; gap:12px }
  .logo-dot { width:8px; height:8px; border-radius:50%; background:var(--purple) }
  .logo-text { font-family:'Plus Jakarta Sans',sans-serif; font-size:15px; font-weight:600; letter-spacing:-0.02em }
  .header-nav { display:flex; gap:4px; padding:3px; background:var(--surface); border-radius:8px; position:absolute; left:50%; transform:translateX(-50%) }
  .nav-link { padding:5px 14px; border-radius:6px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; color:var(--text3); text-decoration:none; transition:all .15s }
  .nav-link:hover { color:var(--text2) }
  .nav-link.active { background:var(--bg); color:var(--text); box-shadow:0 1px 3px rgba(0,0,0,.06) }
  .header-right { font-family:'DM Mono',monospace; font-size:11px; color:var(--text3) }

  /* Shell */
  .shell { max-width:1120px; margin:0 auto; padding:clamp(24px,4vw,48px) }
  .page-title { font-family:'Plus Jakarta Sans',sans-serif; font-size:clamp(28px,4vw,38px); font-weight:700; letter-spacing:-0.035em; margin-bottom:4px; line-height:1.1 }
  .page-sub { font-size:15px; color:var(--text3); margin-bottom:28px }

  /* Summary strip */
  .summary-strip {
    display:flex; gap:24px; padding:14px 20px;
    background:var(--bg); border:1px solid var(--sep); border-radius:12px;
    margin-bottom:40px; align-items:center;
  }
  .summary-stat { display:flex; align-items:baseline; gap:6px }
  .summary-num { font-family:'Plus Jakarta Sans',sans-serif; font-size:20px; font-weight:700; letter-spacing:-0.02em; color:var(--text) }
  .summary-label { font-size:13px; color:var(--text3) }
  .summary-sep { width:1px; height:20px; background:var(--sep) }

  /* Category nav pills */
  .cat-nav { display:flex; gap:8px; margin-bottom:32px; flex-wrap:wrap }
  .cat-pill {
    display:flex; align-items:center; gap:6px;
    padding:6px 14px; border-radius:100px;
    font-size:13px; font-weight:500;
    background:var(--bg); border:1px solid var(--sep);
    color:var(--text2); cursor:pointer;
    transition:all .15s; user-select:none;
  }
  .cat-pill:hover { border-color:var(--text3) }
  .cat-pill .cat-count {
    font-family:'DM Mono',monospace; font-size:11px;
    padding:1px 7px; border-radius:100px;
    background:var(--surface); color:var(--text3);
  }
  .cat-pill.active { border-color:var(--purple); color:var(--purple); background:var(--purple-bg) }
  .cat-pill.active .cat-count { background:rgba(139,92,246,0.15); color:#7c3aed }

  /* Category sections */
  .cat-section { margin-bottom:40px }
  .cat-section.hidden { display:none }
  .cat-header {
    display:flex; align-items:center; gap:10px;
    margin-bottom:16px; padding-bottom:12px;
    border-bottom:1px solid var(--sep);
  }
  .cat-icon {
    width:32px; height:32px; border-radius:9px;
    display:flex; align-items:center; justify-content:center;
    font-size:15px; flex-shrink:0;
  }
  .cat-title { font-family:'Plus Jakarta Sans',sans-serif; font-size:17px; font-weight:700; letter-spacing:-0.02em; color:var(--text) }
  .cat-subtitle { font-size:12px; color:var(--text3); margin-left:auto; font-weight:500 }

  /* Agent card grid */
  .agent-list { display:grid; grid-template-columns:repeat(auto-fill, minmax(220px, 1fr)); gap:10px }

  /* Agent card */
  .agent-row {
    background:var(--bg); border:1px solid var(--sep); border-radius:14px;
    padding:16px; position:relative;
    transition:transform .15s ease, box-shadow .15s ease;
    overflow:hidden; display:flex; flex-direction:column;
  }
  .agent-row:hover {
    transform:translateY(-2px);
    box-shadow:0 6px 20px rgba(0,0,0,0.05);
  }
  .agent-row::before {
    content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
    background:var(--row-accent, var(--gray)); border-radius:3px 0 0 3px; opacity:.5;
  }
  .agent-row:hover::before { opacity:1 }

  .agent-top { display:flex; align-items:center; gap:6px; margin-bottom:8px; flex-wrap:wrap }
  .agent-name {
    font-family:'Plus Jakarta Sans',sans-serif;
    font-size:14px; font-weight:700; letter-spacing:-0.01em; color:var(--text);
    width:100%; margin-bottom:2px;
  }
  .model-badge {
    font-family:'DM Mono',monospace; font-size:9px; font-weight:500;
    padding:1px 6px; border-radius:100px;
    background:var(--purple-bg); color:#6d28d9;
    text-transform:uppercase; letter-spacing:0.03em;
  }
  .perm-badge { font-size:9px; font-weight:600; padding:1px 6px; border-radius:100px; text-transform:uppercase; letter-spacing:0.03em }
  .perm-badge.rw { background:var(--green-bg); color:#166534 }
  .perm-badge.ro { background:var(--surface); color:var(--text3) }

  .agent-when {
    font-size:12px; color:var(--text2); line-height:1.4;
    flex:1;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
    overflow:hidden;
  }
  /* Tools row */
  .agent-tools {
    display:flex; flex-wrap:wrap; gap:3px;
    margin-top:10px; padding-top:8px;
    border-top:1px solid var(--sep);
  }
  .tool-pill {
    font-family:'DM Mono',monospace; font-size:9px; font-weight:500;
    padding:1px 6px; border-radius:100px;
    background:var(--surface); color:var(--text3);
  }
  .tool-pill.t-edit { background:var(--green-bg); color:#166534 }
  .tool-pill.t-bash { background:var(--amber-bg); color:#92400e }
  .tool-pill.t-web { background:var(--blue-bg); color:#1d4ed8 }

  /* Command cards */
  .cmd-card {
    background:var(--bg); border:1px solid var(--sep); border-radius:14px;
    padding:16px; position:relative;
    transition:transform .15s ease, box-shadow .15s ease;
    overflow:hidden; display:flex; flex-direction:column;
  }
  .cmd-card:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,0,0,0.05) }
  .cmd-card::before {
    content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
    background:var(--purple); border-radius:3px 0 0 3px; opacity:.5;
  }
  .cmd-card:hover::before { opacity:1 }
  .cmd-card-name { font-family:'DM Mono',monospace; font-size:14px; font-weight:600; color:var(--purple); margin-bottom:6px }
  .cmd-card-desc { font-size:12px; color:var(--text2); line-height:1.4; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; flex:1 }
  .cmd-card-type {
    font-family:'DM Mono',monospace; font-size:9px; font-weight:500;
    padding:1px 6px; border-radius:100px;
    background:var(--purple-bg); color:#6d28d9;
    text-transform:uppercase; letter-spacing:0.03em;
    align-self:flex-start; margin-top:10px;
  }

  /* Collapsible sections */
  .secondary-section { margin-top:48px }
  .collapsible-header {
    display:flex; align-items:center; gap:12px;
    padding:14px 20px; cursor:pointer; user-select:none;
    background:var(--bg); border:1px solid var(--sep); border-radius:12px;
    transition:all .15s;
  }
  .collapsible-header:hover { background:#fcfcfc }
  .collapsible-arrow { font-size:10px; color:var(--text3); transition:transform .2s; flex-shrink:0 }
  .collapsible-header.open .collapsible-arrow { transform:rotate(90deg) }
  .collapsible-title { font-family:'Plus Jakarta Sans',sans-serif; font-size:15px; font-weight:700; letter-spacing:-0.02em; flex:1 }
  .collapsible-count { font-family:'DM Mono',monospace; font-size:11px; padding:2px 10px; border-radius:100px; background:var(--surface); color:var(--text3) }
  .collapsible-body { display:none; margin-top:8px }
  .collapsible-header.open + .collapsible-body { display:block }

  .builtin-list { display:flex; flex-direction:column; gap:1px; background:var(--sep); border-radius:12px; overflow:hidden }
  .builtin-item { display:flex; align-items:center; gap:16px; padding:12px 20px; background:var(--bg) }
  .builtin-name { font-family:'DM Mono',monospace; font-size:13px; font-weight:500; color:var(--text); min-width:120px }
  .builtin-desc { font-size:13px; color:var(--text2); flex:1 }
  .builtin-model { font-family:'DM Mono',monospace; font-size:10px; padding:2px 8px; border-radius:100px; background:var(--surface); color:var(--text3) }

  /* MCP Server cards */
  .mcp-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:10px }
  .mcp-card {
    background:var(--bg); border:1px solid var(--sep); border-radius:14px;
    padding:16px; position:relative; cursor:pointer;
    transition:transform .15s ease, box-shadow .15s ease;
    overflow:hidden;
  }
  .mcp-card:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,0,0,0.05) }
  .mcp-card::before {
    content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
    background:var(--cyan); border-radius:3px 0 0 3px; opacity:.5;
  }
  .mcp-card:hover::before { opacity:1 }
  .mcp-card-top { display:flex; align-items:center; gap:8px; margin-bottom:6px }
  .mcp-card-name {
    font-family:'Plus Jakarta Sans',sans-serif; font-size:15px; font-weight:700;
    letter-spacing:-0.01em; color:var(--text);
  }
  .mcp-card-badge {
    font-family:'DM Mono',monospace; font-size:9px; font-weight:600;
    padding:2px 8px; border-radius:100px;
    background:var(--cyan-bg); color:#0e7490;
    text-transform:uppercase; letter-spacing:0.03em;
  }
  .mcp-card-scope {
    font-size:9px; font-weight:600; padding:1px 6px; border-radius:100px;
    text-transform:uppercase; letter-spacing:0.03em;
    background:var(--surface); color:var(--text3);
  }
  .mcp-card-desc { font-size:12px; color:var(--text2); line-height:1.4; margin-bottom:8px }
  .mcp-card-cmd {
    font-family:'DM Mono',monospace; font-size:10px; color:var(--text3);
    background:var(--surface); padding:4px 8px; border-radius:6px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }

  /* Sub-labels (AGENTS, SKILLS) */
  .sub-label {
    font-size:11px; font-weight:600; text-transform:uppercase;
    letter-spacing:0.08em; color:var(--text3); margin-bottom:10px;
  }

  /* Skill pill row */
  .skills-pill-row {
    display:flex; flex-wrap:wrap; gap:6px;
  }
  .skill-pill-card {
    display:flex; align-items:center; gap:6px;
    background:var(--bg); border:1px solid var(--sep); border-radius:8px;
    padding:5px 10px; cursor:pointer;
    transition:all .12s;
  }
  .skill-pill-card:hover { background:#f0f0f0; border-color:var(--text3); transform:translateY(-1px) }
  .skill-pill-name {
    font-family:'DM Mono',monospace; font-size:11px; font-weight:600;
    white-space:nowrap;
  }
  .skill-pill-desc {
    font-size:11px; color:var(--text3);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:180px;
  }

  /* Detail modal overlay */
  .detail-overlay {
    display:none; position:fixed; inset:0; z-index:100;
    background:rgba(0,0,0,0.4); backdrop-filter:blur(4px);
    align-items:center; justify-content:center;
  }
  .detail-overlay.open { display:flex }
  .detail-panel {
    background:var(--bg); border-radius:16px; width:min(680px,90vw);
    max-height:70vh; overflow-y:auto; padding:32px;
    box-shadow:0 20px 60px rgba(0,0,0,0.15);
    position:relative;
    margin:48px 0;
  }
  .detail-close {
    position:absolute; top:16px; right:16px;
    width:28px; height:28px; border-radius:8px;
    border:none; background:var(--surface); color:var(--text3);
    font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:all .12s;
  }
  .detail-close:hover { background:var(--surface2); color:var(--text) }
  .detail-title {
    font-family:'Plus Jakarta Sans',sans-serif; font-size:22px; font-weight:700;
    letter-spacing:-0.03em; margin-bottom:6px;
    display:flex; align-items:center; gap:10px;
  }
  .detail-type-badge {
    font-family:'DM Mono',monospace; font-size:10px; font-weight:700;
    padding:3px 10px; border-radius:100px;
    text-transform:uppercase; letter-spacing:0.05em;
    flex-shrink:0;
  }
  .detail-type-badge.skill { background:var(--green-bg); color:#166534 }
  .detail-type-badge.agent { background:var(--purple-bg); color:#6d28d9 }
  .detail-source {
    font-family:'DM Mono',monospace; font-size:11px; color:var(--text3);
    margin-bottom:16px;
  }
  .detail-body {
    font-size:14px; color:var(--text2); line-height:1.7;
  }
  .detail-body h1,.detail-body h2,.detail-body h3 {
    font-family:'Plus Jakarta Sans',sans-serif; color:var(--text);
    margin:20px 0 8px; letter-spacing:-0.02em;
  }
  .detail-body h1 { font-size:20px; font-weight:700 }
  .detail-body h2 { font-size:16px; font-weight:700 }
  .detail-body h3 { font-size:14px; font-weight:600 }
  .detail-body p { margin:6px 0 }
  .detail-body ul,.detail-body ol { padding-left:20px; margin:6px 0 }
  .detail-body li { margin:3px 0 }
  .detail-body code {
    font-family:'DM Mono',monospace; font-size:12px;
    background:var(--surface); padding:1px 5px; border-radius:4px;
  }
  .detail-body pre {
    background:var(--surface); border-radius:8px; padding:12px 16px;
    overflow-x:auto; margin:8px 0; font-family:'DM Mono',monospace; font-size:12px;
    line-height:1.5;
  }
  .detail-body pre code { background:none; padding:0 }
  .detail-body blockquote {
    border-left:3px solid var(--purple); padding-left:12px; margin:8px 0;
    color:var(--text3); font-style:italic;
  }
  .detail-body strong { color:var(--text); font-weight:600 }
  .detail-body hr { border:none; border-top:1px solid var(--sep); margin:16px 0 }
  .detail-body table { border-collapse:collapse; width:100%; margin:8px 0 }
  .detail-body th,.detail-body td { border:1px solid var(--sep); padding:6px 10px; font-size:12px; text-align:left }
  .detail-body th { background:var(--surface); font-weight:600 }

  /* Responsive */
  @media (max-width:800px) {
    .shell { padding:20px 16px }
    .page-title { font-size:24px }
    .summary-strip { flex-wrap:wrap; gap:12px 20px }
    .cat-nav { gap:6px }
    .cat-pill { font-size:12px; padding:5px 12px }
    .agent-list { grid-template-columns:repeat(auto-fill, minmax(160px, 1fr)); gap:8px }
    .agent-row { padding:12px }
    .skills-grid { grid-template-columns:1fr }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    <div class="logo-text">Mission Control</div>
  </div>
  <nav class="header-nav">
    <a href="/" class="nav-link">Dashboard</a>
    <a href="/dispatch" class="nav-link">Dispatch</a>
    <a href="/findings" class="nav-link">Findings</a>
    <a href="/workflow" class="nav-link">Workflow</a>
    <a href="/postmortems" class="nav-link">Post-Mortems</a>
    <a href="/tools" class="nav-link active">Toolbox</a>
    <a href="/logic" class="nav-link">Logic</a>
    <a href="/radar" class="nav-link">Radar</a>
  </nav>
  <div class="header-right"></div>
</header>

<div class="shell">
  <h1 class="page-title">Toolbox</h1>
  <p class="page-sub">Your agent team, skills, commands, and built-in tools</p>
  <div id="main"><div style="padding:60px;text-align:center;color:#999">Loading...</div></div>
</div>

<!-- Detail modal -->
<div class="detail-overlay" id="detail-overlay" onclick="if(event.target===this)closeDetail()">
  <div class="detail-panel">
    <button class="detail-close" onclick="closeDetail()">&times;</button>
    <div class="detail-title" id="detail-title"></div>
    <div class="detail-source" id="detail-source"></div>
    <div class="detail-body" id="detail-body"></div>
  </div>
</div>

<script>
// ── Category definitions ────────────────────────────────────────────────────
const CATEGORIES = {
  planning: {
    label: 'Planning & Architecture',
    subtitle: 'Design, plan, and make decisions',
    icon: '\u25C9',
    color: 'var(--purple)',
    colorBg: 'var(--purple-bg)',
    agents: ['orchestrator', 'agent-expert', 'configurator', 'planner', 'architect'],
  },
  quality: {
    label: 'Quality & Security',
    subtitle: 'Review, audit, test, and secure',
    icon: '\u25A0',
    color: 'var(--rose)',
    colorBg: 'var(--rose-bg)',
    agents: ['critic', 'guard', 'qa', 'code-reviewer', 'security-reviewer', 'tdd-guide', 'e2e-runner'],
  },
  development: {
    label: 'Development & Build',
    subtitle: 'Build, fix, refactor, and document',
    icon: '\u25B6',
    color: 'var(--green)',
    colorBg: 'var(--green-bg)',
    agents: ['a11y', 'design', 'perf', 'build-error-resolver', 'refactor-cleaner', 'doc-updater'],
  },
  research: {
    label: 'Learning & Skills',
    subtitle: 'Extract patterns, analyze interfaces',
    icon: '\u25CB',
    color: 'var(--blue)',
    colorBg: 'var(--blue-bg)',
    agents: ['competitive-analyst', 'scientist', 'scout'],
  },
  languages: {
    label: 'Language Specialists',
    subtitle: 'Go, Python, SQL, and more',
    icon: '\u25B7',
    color: 'var(--amber)',
    colorBg: 'var(--amber-bg)',
    agents: ['go-build-resolver', 'go-reviewer', 'python-reviewer', 'database-reviewer'],
  },
  utilities: {
    label: 'Utilities & Scraping',
    subtitle: 'Misc tools and helpers',
    icon: '\u2699',
    color: 'var(--gray)',
    colorBg: 'var(--surface)',
    agents: ['skills-guide'],
  },
};

// ── Skill-to-CATEGORY mapping (skills live alongside agents, not inside them) ──
const SKILL_CAT_MAP = {
  // Design skills → development
  'impeccable-adapt': 'development', 'impeccable-animate': 'development', 'impeccable-audit': 'development',
  'impeccable-bolder': 'development', 'impeccable-clarify': 'development', 'impeccable-colorize': 'development',
  'impeccable-critique': 'development', 'impeccable-delight': 'development', 'impeccable-distill': 'development',
  'impeccable-extract': 'development', 'impeccable-frontend-design': 'development', 'impeccable-harden': 'development',
  'impeccable-normalize': 'development', 'impeccable-onboard': 'development', 'impeccable-optimize': 'development',
  'impeccable-polish': 'development', 'impeccable-quieter': 'development', 'impeccable-teach-impeccable': 'development',
  'frontend-design': 'development', 'enhance-prompt': 'development', 'design-md': 'development',
  // Planning skills → planning
  'brainstorming': 'planning', 'writing-plans': 'planning', 'executing-plans': 'planning',
  'dispatching-parallel-agents': 'planning', 'subagent-driven-development': 'planning',
  'agent-development': 'planning', 'skill-creator': 'planning', 'writing-hookify-rules': 'planning',
  'agent-skill-creator': 'planning', 'skill-builder': 'planning',
  // Quality skills → quality
  'test-driven-development': 'quality', 'verification-before-completion': 'quality',
  // Research skills → research
  'systematic-debugging': 'research',
  // Work: language/framework skills → languages
  'golang-patterns': 'languages', 'golang-testing': 'languages',
  'python-patterns': 'languages', 'python-testing': 'languages',
  'django-patterns': 'languages', 'django-security': 'languages', 'django-tdd': 'languages', 'django-verification': 'languages',
  'springboot-patterns': 'languages', 'springboot-security': 'languages', 'springboot-tdd': 'languages', 'springboot-verification': 'languages',
  'java-coding-standards': 'languages', 'jpa-patterns': 'languages', 'postgres-patterns': 'languages',
  'clickhouse-io': 'languages',
  // Work: development skills → development
  'backend-patterns': 'development', 'frontend-patterns': 'development', 'coding-standards': 'development',
  'project-guidelines-example': 'development', 'configure-ecc': 'development',
  // Work: quality skills → quality
  'tdd-workflow': 'quality', 'verification-loop': 'quality', 'eval-harness': 'quality', 'security-review': 'quality',
  // Work: research/learning skills → research
  'continuous-learning': 'research', 'continuous-learning-v2': 'research',

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toolPillClass(t) {
  if (['Edit','Write'].includes(t)) return 'tool-pill t-edit';
  if (t === 'Bash') return 'tool-pill t-bash';
  if (['WebSearch','WebFetch'].includes(t)) return 'tool-pill t-web';
  return 'tool-pill';
}

function shortSkillName(source) {
  if (source.startsWith('impeccable-')) return '/' + source.replace('impeccable-', '');
  return source;
}

function renderAgentRow(a) {
  // Derive accent from category, fall back to AGENT_ACCENTS, then gray
  const catKey = AGENT_CAT[a.name];
  const accent = catKey ? CATEGORIES[catKey].color : (AGENT_ACCENTS[a.name] || 'var(--gray)');
  const when = AGENT_WHEN[a.name] || a.description || '';
  const permClass = a.canEdit ? 'perm-badge rw' : 'perm-badge ro';
  const permLabel = a.canEdit ? 'read/write' : 'read-only';

  let toolsHtml = '';
  a.tools.forEach(t => {
    toolsHtml += '<span class="' + toolPillClass(t) + '">' + esc(t) + '</span>';
  });

  return '<div class="agent-row" style="--row-accent:' + accent + ';cursor:pointer" onclick="openAgentDetail(\'' + esc(a.name) + '\')">'
    + '<div class="agent-top">'
    + '<span class="agent-name">' + esc(a.name) + '</span>'
    + '<span class="model-badge">' + esc(a.model) + '</span>'
    + '<span class="' + permClass + '">' + permLabel + '</span>'
    + '</div>'
    + '<div class="agent-when">' + esc(when) + '</div>'
    + '<div class="agent-tools">' + toolsHtml + '</div>'
    + '</div>';
}

function renderSkillPill(s, catColor) {
  const name = shortSkillName(s.source);
  return '<div class="skill-pill-card" style="border-left:3px solid ' + catColor + '" onclick="openSkillDetail(\'' + esc(s.source) + '\')">'
    + '<span class="skill-pill-name" style="color:' + catColor + '">' + esc(name) + '</span>'
    + '</div>';
}

// ── Markdown renderer (simple) ──
function renderMd(md) {
  // Strip frontmatter
  md = md.replace(/^---\n[\s\S]*?\n---\n?/, '');
  // Code blocks
  md = md.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  // Inline code
  md = md.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Headers
  md = md.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  md = md.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  md = md.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // Bold / italic
  md = md.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  md = md.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  // Blockquotes
  md = md.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
  // Unordered lists
  md = md.replace(/^- (.+)$/gm, '<li>$1</li>');
  md = md.replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>');
  md = md.replace(/<\/ul>\s*<ul>/g, '');
  // Horizontal rules
  md = md.replace(/^---$/gm, '<hr>');
  // Tables (basic)
  md = md.replace(/^\|(.+)\|\s*\n\|[-| ]+\|\s*\n((?:\|.+\|\s*\n?)*)/gm, (_, hdr, body) => {
    const ths = hdr.split('|').filter(Boolean).map(c => '<th>' + c.trim() + '</th>').join('');
    const rows = body.trim().split('\n').map(r => {
      const tds = r.split('|').filter(Boolean).map(c => '<td>' + c.trim() + '</td>').join('');
      return '<tr>' + tds + '</tr>';
    }).join('');
    return '<table><thead><tr>' + ths + '</tr></thead><tbody>' + rows + '</tbody></table>';
  });
  // Paragraphs
  md = md.replace(/\n{2,}/g, '</p><p>');
  md = '<p>' + md + '</p>';
  md = md.replace(/<p>\s*(<h[123]|<pre|<ul|<blockquote|<hr|<table)/g, '$1');
  md = md.replace(/(<\/h[123]>|<\/pre>|<\/ul>|<\/blockquote>|<hr>|<\/table>)\s*<\/p>/g, '$1');
  return md;
}

// ── Detail modal ──
async function openSkillDetail(source) {
  document.getElementById('detail-title').innerHTML = esc(source) + ' <span class="detail-type-badge skill">Skill</span>';
  document.getElementById('detail-source').textContent = 'Loading...';
  document.getElementById('detail-body').innerHTML = '';
  document.getElementById('detail-overlay').classList.add('open');
  try {
    const r = await fetch('/api/skill/' + encodeURIComponent(source));
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    document.getElementById('detail-title').innerHTML = esc(shortSkillName(d.source)) + ' <span class="detail-type-badge skill">Skill</span>';
    document.getElementById('detail-source').textContent = '.claude/skills/' + d.source + '/SKILL.md';
    document.getElementById('detail-body').innerHTML = renderMd(d.content);
  } catch (e) {
    document.getElementById('detail-body').innerHTML = '<p style="color:var(--rose)">Could not load: ' + esc(e.message) + '</p>';
  }
}

async function openAgentDetail(name) {
  document.getElementById('detail-title').innerHTML = esc(name) + ' <span class="detail-type-badge agent">Agent</span>';
  document.getElementById('detail-source').textContent = 'Loading...';
  document.getElementById('detail-body').innerHTML = '';
  document.getElementById('detail-overlay').classList.add('open');
  try {
    const r = await fetch('/api/agent/' + encodeURIComponent(name));
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    document.getElementById('detail-title').innerHTML = esc(d.name) + ' <span class="detail-type-badge agent">Agent</span>';
    document.getElementById('detail-source').textContent = '.claude/agents/' + d.name + '.md';
    document.getElementById('detail-body').innerHTML = renderMd(d.content);
  } catch (e) {
    document.getElementById('detail-body').innerHTML = '<p style="color:var(--rose)">Could not load: ' + esc(e.message) + '</p>';
  }
}

function openMcpDetail(name) {
  const meta = MCP_META[name] || { desc: 'No details available', detail: '' };
  document.getElementById('detail-title').innerHTML = esc(name) + ' <span class="detail-type-badge" style="background:var(--cyan-bg);color:#0e7490">MCP</span>';
  document.getElementById('detail-source').textContent = 'MCP Server';
  document.getElementById('detail-body').innerHTML = renderMd('# ' + name + '\n\n' + meta.detail);
  document.getElementById('detail-overlay').classList.add('open');
}

function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('open');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

// ── Filter state ────────────────────────────────────────────────────────────
let activeFilter = 'all';

function setFilter(key) {
  activeFilter = key;
  document.querySelectorAll('.cat-pill').forEach(el => {
    el.classList.toggle('active', el.dataset.cat === key);
  });
  document.querySelectorAll('.cat-section').forEach(el => {
    if (key === 'all') el.classList.remove('hidden');
    else el.classList.toggle('hidden', el.dataset.cat !== key);
  });
}

function toggleCollapsible(el) {
  el.classList.toggle('open');
}

function currentMode() { return (window.__getMode && window.__getMode()) || localStorage.getItem('mc-mode') || 'home'; }

// Filter tools by mode context — tools not in context map show in both modes
function filterByMode(items, nameKey, ctxMap) {
  const mode = currentMode();
  return items.filter(item => {
    const name = item[nameKey] || '';
    const ctx = ctxMap[name];
    return ctx === null || ctx === undefined || ctx === mode;
  });
}

async function load() {
  try {
    const [data, ctxMap] = await Promise.all([
      fetch('/api/tools').then(r => r.json()),
      fetch('/api/toolbox-context').then(r => r.json()),
    ]);
    const agents = filterByMode(data.agents || [], 'name', ctxMap);
    const commands = filterByMode(data.commands || [], 'name', ctxMap);
    const skills = filterByMode(data.skills || [], 'source', ctxMap);
    const builtins = data.builtins || [];

    // Group agents by category
    const grouped = {};
    for (const key of Object.keys(CATEGORIES)) grouped[key] = [];
    const uncategorized = [];
    agents.forEach(a => {
      const cat = AGENT_CAT[a.name];
      if (cat && grouped[cat]) grouped[cat].push(a);
      else uncategorized.push(a);
    });

    // Group skills by category
    const skillsByCat = {};
    for (const key of Object.keys(CATEGORIES)) skillsByCat[key] = [];
    const unmappedSkills = [];
    skills.forEach(s => {
      const cat = SKILL_CAT_MAP[s.source];
      if (cat) skillsByCat[cat].push(s);
      else unmappedSkills.push(s);
    });

    // Group commands by category
    const cmdsByCat = {};
    for (const key of Object.keys(CATEGORIES)) cmdsByCat[key] = [];
    const unmappedCmds = [];
    commands.forEach(c => {
      const cat = CMD_CAT_MAP[c.name];
      if (cat && cmdsByCat[cat]) cmdsByCat[cat].push(c);
      else unmappedCmds.push(c);
    });

    let h = '';

    // Summary strip
    h += '<div class="summary-strip">';
    h += '<div class="summary-stat"><span class="summary-num">' + agents.length + '</span><span class="summary-label">agents</span></div>';
    h += '<div class="summary-sep"></div>';
    h += '<div class="summary-stat"><span class="summary-num">' + skills.length + '</span><span class="summary-label">skills</span></div>';
    h += '<div class="summary-sep"></div>';
    h += '<div class="summary-stat"><span class="summary-num">' + commands.length + '</span><span class="summary-label">commands</span></div>';
    h += '<div class="summary-sep"></div>';
    h += '<div class="summary-stat"><span class="summary-num">' + builtins.length + '</span><span class="summary-label">built-in</span></div>';
    const mcpCount = (data.mcpServers || []).length;
    if (mcpCount > 0) {
      h += '<div class="summary-sep"></div>';
      h += '<div class="summary-stat"><span class="summary-num">' + mcpCount + '</span><span class="summary-label">MCP</span></div>';
    }
    h += '</div>';

    // Category filter pills
    const totalItems = agents.length + skills.length + commands.length;
    h += '<div class="cat-nav">';
    h += '<div class="cat-pill active" data-cat="all" onclick="setFilter(\'all\')">All<span class="cat-count">' + totalItems + '</span></div>';
    for (const [key, cat] of Object.entries(CATEGORIES)) {
      const count = grouped[key].length + (skillsByCat[key] || []).length + (cmdsByCat[key] || []).length;
      if (count === 0) continue;
      h += '<div class="cat-pill" data-cat="' + key + '" onclick="setFilter(\'' + key + '\')">'
        + esc(cat.label) + '<span class="cat-count">' + count + '</span></div>';
    }
    h += '</div>';

    // Category sections: AGENTS grid, then SKILLS pills below
    for (const [key, cat] of Object.entries(CATEGORIES)) {
      const catAgents = grouped[key];
      const catSkills = skillsByCat[key] || [];
      const catCmds = cmdsByCat[key] || [];
      if (catAgents.length === 0 && catSkills.length === 0 && catCmds.length === 0) continue;

      h += '<div class="cat-section" data-cat="' + key + '">';
      h += '<div class="cat-header">';
      h += '<div class="cat-icon" style="background:' + cat.colorBg + ';color:' + cat.color + '">' + cat.icon + '</div>';
      h += '<div class="cat-title">' + esc(cat.label) + '</div>';
      h += '<div class="cat-subtitle">' + esc(cat.subtitle) + '</div>';
      h += '</div>';

      // AGENTS subsection
      if (catAgents.length > 0) {
        h += '<div class="sub-label">AGENTS</div>';
        h += '<div class="agent-list">';
        catAgents.forEach(a => { h += renderAgentRow(a); });
        h += '</div>';
      }

      // SKILLS subsection
      if (catSkills.length > 0) {
        h += '<div class="sub-label" style="margin-top:20px">SKILLS</div>';
        h += '<div class="skills-pill-row">';
        catSkills.forEach(s => { h += renderSkillPill(s, cat.color); });
        h += '</div>';
      }

      // COMMANDS subsection
      if (catCmds.length > 0) {
        h += '<div class="sub-label" style="margin-top:20px">COMMANDS</div>';
        h += '<div class="skills-pill-row">';
        catCmds.forEach(c => {
          h += '<div class="skill-pill-card" style="border-left:3px solid ' + cat.color + '">'
            + '<span class="skill-pill-name" style="color:' + cat.color + '">/' + esc(c.name) + '</span>'
            + '<span class="skill-pill-desc">' + esc(c.description).substring(0, 60) + '</span>'
            + '</div>';
        });
        h += '</div>';
      }

      h += '</div>';
    }

    // Uncategorized agents
    if (uncategorized.length > 0) {
      h += '<div class="cat-section" data-cat="other">';
      h += '<div class="cat-header">';
      h += '<div class="cat-icon" style="background:var(--surface);color:var(--text3)">\u2026</div>';
      h += '<div class="cat-title">Other</div>';
      h += '<div class="cat-subtitle">Uncategorized</div>';
      h += '</div>';
      h += '<div class="sub-label">AGENTS</div>';
      h += '<div class="agent-list">';
      uncategorized.forEach(a => { h += renderAgentRow(a); });
      h += '</div></div>';
    }

    // Unmapped skills
    if (unmappedSkills.length > 0) {
      h += '<div class="cat-section" data-cat="other-skills">';
      h += '<div class="cat-header">';
      h += '<div class="cat-icon" style="background:var(--surface);color:var(--text3)">\u2726</div>';
      h += '<div class="cat-title">Other Skills</div>';
      h += '<div class="cat-subtitle">' + unmappedSkills.length + ' uncategorized</div>';
      h += '</div>';
      h += '<div class="skills-pill-row">';
      unmappedSkills.forEach(s => { h += renderSkillPill(s, 'var(--gray)'); });
      h += '</div></div>';
    }

    // Unmapped commands
    if (unmappedCmds.length > 0) {
      h += '<div class="cat-section" data-cat="other-commands">';
      h += '<div class="cat-header">';
      h += '<div class="cat-icon" style="background:var(--surface);color:var(--text3)">/</div>';
      h += '<div class="cat-title">Other Commands</div>';
      h += '<div class="cat-subtitle">' + unmappedCmds.length + ' uncategorized</div>';
      h += '</div>';
      h += '<div class="skills-pill-row">';
      unmappedCmds.forEach(c => {
        h += '<div class="skill-pill-card" style="border-left:3px solid var(--gray)">'
          + '<span class="skill-pill-name" style="color:var(--text3)">/' + esc(c.name) + '</span>'
          + '<span class="skill-pill-desc">' + esc(c.description).substring(0, 60) + '</span>'
          + '</div>';
      });
      h += '</div></div>';
    }

    // MCP Servers
    const mcpServers = data.mcpServers || [];
    if (mcpServers.length > 0) {
      h += '<div class="cat-section" data-cat="mcp">';
      h += '<div class="cat-header">';
      h += '<div class="cat-icon" style="background:var(--cyan-bg);color:var(--cyan)">\u2B21</div>';
      h += '<div class="cat-title">MCP Servers</div>';
      h += '<div class="cat-subtitle">' + mcpServers.length + ' connected</div>';
      h += '</div>';
      h += '<div class="mcp-grid">';
      mcpServers.forEach(m => {
        const meta = MCP_META[m.name] || { desc: 'MCP server', tools: [], detail: '' };
        const toolsHtml = meta.tools.map(t => '<span class="tool-pill">' + esc(t) + '</span>').join('');
        const cmdStr = m.command + ' ' + m.args.join(' ');
        h += '<div class="mcp-card" onclick="openMcpDetail(\'' + esc(m.name) + '\')">';
        h += '<div class="mcp-card-top">';
        h += '<span class="mcp-card-name">' + esc(m.name) + '</span>';
        h += '<span class="mcp-card-badge">MCP</span>';
        h += '<span class="mcp-card-scope">' + esc(m.scope) + '</span>';
        h += '</div>';
        h += '<div class="mcp-card-desc">' + esc(meta.desc) + '</div>';
        h += '<div style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px">' + toolsHtml + '</div>';
        h += '<div class="mcp-card-cmd">' + esc(cmdStr) + '</div>';
        h += '</div>';
      });
      h += '</div></div>';
    }

    // Built-ins
    if (builtins.length > 0) {
      h += '<div class="secondary-section" style="margin-top:12px">';
      h += '<div class="collapsible-header" onclick="toggleCollapsible(this)">';
      h += '<span class="collapsible-arrow">\u25B6</span>';
      h += '<span class="collapsible-title">Built-in Agents</span>';
      h += '<span class="collapsible-count">' + builtins.length + '</span>';
      h += '</div>';
      h += '<div class="collapsible-body">';
      h += '<div class="builtin-list">';
      builtins.forEach(b => {
        h += '<div class="builtin-item">';
        h += '<div class="builtin-name">' + esc(b.name) + '</div>';
        h += '<div class="builtin-desc">' + esc(b.description) + '</div>';
        h += '<div class="builtin-model">' + esc(b.model) + '</div>';
        h += '</div>';
      });
      h += '</div></div></div>';
    }

    document.getElementById('main').innerHTML = h;
  } catch (e) {
    document.getElementById('main').innerHTML = '<div style="padding:60px;text-align:center;color:#ef4444">Failed to load: ' + e.message + '</div>';
  }
}

load();
window.addEventListener('modechange', load);
</script>
