<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sprint Prompts &mdash; Mission Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fff;--bg2:#fafafa;--surface:#f4f4f5;--surface2:#e4e4e7;
  --text:#09090b;--text2:#52525b;--text3:#a1a1aa;--sep:#e4e4e7;
  --purple:#8b5cf6;--purple-bg:rgba(139,92,246,0.06);
  --green:#22c55e;--green-bg:rgba(34,197,94,0.06);
  --radius:12px;
}
body{background:var(--bg2);color:var(--text);font-family:'DM Sans',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh}
.shell{max-width:820px;margin:0 auto;padding:40px 20px 80px}
h1{font-family:'Plus Jakarta Sans',sans-serif;font-size:28px;font-weight:800;letter-spacing:-0.04em;margin-bottom:6px}
.subtitle{font-size:14px;color:var(--text3);margin-bottom:32px}
.prompt-card{background:var(--bg);border:1px solid var(--sep);border-radius:16px;margin-bottom:20px;overflow:hidden;transition:box-shadow .2s}
.prompt-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.06)}
.prompt-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--sep);cursor:pointer;user-select:none}
.prompt-name{font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;font-weight:700;letter-spacing:-0.02em}
.prompt-focus{font-size:12px;color:var(--text3);margin-top:2px}
.copy-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;background:var(--purple);color:#fff;border:none;cursor:pointer;transition:all .15s;flex-shrink:0}
.copy-btn:hover{background:#7c3aed;transform:scale(1.02)}
.copy-btn.copied{background:var(--green)}
.prompt-body{padding:16px 20px;max-height:200px;overflow-y:auto;position:relative}
.prompt-body::-webkit-scrollbar{width:4px}
.prompt-body::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:2px}
.prompt-text{font-family:'DM Mono',monospace;font-size:12px;line-height:1.7;color:var(--text2);white-space:pre-wrap;word-break:break-word}
.back-link{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--text3);text-decoration:none;margin-bottom:20px;transition:color .12s}
.back-link:hover{color:var(--text)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a1a;color:#fff;padding:10px 24px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;transition:all .25s ease;pointer-events:none;z-index:100}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="shell">
  <a href="/campaigns" class="back-link"><span>&larr;</span> Back to Campaigns</a>
  <h1>Sprint Prompts</h1>
  <p class="subtitle">Click "Copy" to grab each prompt. Paste into a new terminal. One click, done.</p>
  <div id="cards"></div>
</div>
<div class="toast" id="toast">Copied to clipboard</div>

<script>
const prompts = [
  {
    name: 'Beacon',
    focus: 'Terminal Identity + Session Retrospective',
    text: `Hey, I need you to work on two critical things for my workflow. This is part of a coordinated sprint I'm running right now \u2014 I have 4 agents working simultaneously on different parts of Mission Control. You're the Beacon agent.

Your two tasks:
1. Terminal Identity \u2014 I run 3-5 Claude Code sessions at once and every single terminal tab looks identical. "Claude Code" on all of them. I need to glance at a window and instantly know which agent is which. Think terminal titles, color coding, something that maps to what the Dashboard shows.
2. Session End Retrospective \u2014 when I type "ending the session," I want a hook or command that fires and captures what happened: accomplishments, decisions, unfinished work, insights. Right now context just evaporates when a session ends.

First thing: read the full brief I prepared for you at:
C:\\Users\\ephra\\phredomade\\.claude\\agent-hub\\coordinated-sprint\\agent-a-terminal-identity.md

It has everything \u2014 technical details, file paths, how I work, what other agents are doing, working agreements so you don't step on files other agents own. Also read CLAUDE.md at C:\\Users\\ephra\\phredomade\\CLAUDE.md for the non-negotiable behavioral rules.

Key files you'll be working with:
- .claude/agent-hub/hook.js (PostToolUse + Stop hook)
- .claude/agent-hub/prompt-hook.js (PromptSubmit hook)
- .claude/commands/ (for new slash commands)
- .claude/agent-hub/states/ (session state files)

DON'T touch dispatch-page.html, findings.json, server.js, or campaigns-page.html \u2014 other agents own those.

Read the brief, then tell me your plan before you start building.`
  },
  {
    name: 'Compass',
    focus: 'Strategic Evaluator + Value Proposition',
    text: `Hey, I need you to be my strategic brain right now. This is part of a coordinated sprint \u2014 4 agents working simultaneously on Mission Control. You're the Compass agent, the thinker.

Your job is NOT to write code (mostly). Your job is to deeply evaluate where Mission Control is, where it should go, and articulate that clearly. I demoed MC in a 45-minute presentation to friends and I want to be much more clear about the value proposition.

Specific tasks:
1. Read through the entire MC codebase and data \u2014 evaluate what works, what's missing, what matters most
2. Articulate the value proposition \u2014 what IS Mission Control and why does it matter?
3. Plan a hidden /why page that explains MC to someone who's never seen it
4. Assess the dissect-video toolbox command for home machine adaptation
5. Give me a prioritized "here's what MC should focus on next" recommendation \u2014 be opinionated

First thing: read the full brief at:
C:\\Users\\ephra\\phredomade\\.claude\\agent-hub\\coordinated-sprint\\agent-b-strategic-evaluator.md

Also read CLAUDE.md at C:\\Users\\ephra\\phredomade\\CLAUDE.md for behavioral rules.

The brief has all the file paths you need to read for your assessment \u2014 server.js, all the page HTML files, dispatch data, findings, everything. Write your outputs to:
.claude/agent-hub/coordinated-sprint/agent-b-output.md

DON'T modify any existing MC code. You're researching and thinking, not building (unless you draft the /why page).

Read the brief, then start your evaluation.`
  },
  {
    name: 'Overwatch',
    focus: 'Agent Interface + Multi-Agent UX',
    text: `Hey, I need you to investigate something that's been a huge pain point for me. This is part of a coordinated sprint \u2014 4 agents working simultaneously. You're the Overwatch agent.

The problem: I run multiple agents at once and it's chaos. I can't tell which terminal is which, the Dashboard gives me an overview but not depth, and I have no way to click on an agent and just get a summary of what it's doing. I want something like ChatGPT's conversation sidebar but for my agents \u2014 click one, see what it's up to.

Your tasks:
1. Investigate what a ChatGPT-style agent manager interface would look like
2. Deep dive into the current Dashboard \u2014 what does it do well, what's missing?
3. Figure out terminal-to-dashboard mapping \u2014 how do I know which Dashboard card = which terminal window?
4. Research multi-agent UX patterns from other tools (CrewAI, Kubernetes dashboards, CI/CD tools)
5. Either prototype something or write a detailed spec

Also important context: I just built a new "Campaigns" page in MC \u2014 a war room view for coordinated multi-agent efforts like this sprint. It's at .claude/agent-hub/campaigns-page.html. Your research directly feeds improving that design.

First thing: read the full brief at:
C:\\Users\\ephra\\phredomade\\.claude\\agent-hub\\coordinated-sprint\\agent-c-agent-interface.md

Also read CLAUDE.md at C:\\Users\\ephra\\phredomade\\CLAUDE.md for behavioral rules.

Key files to study:
- .claude/agent-hub/server.js (especially the "/" route \u2014 Dashboard is embedded there)
- .claude/agent-hub/hook.js (how agent state gets written)
- .claude/agent-hub/states/ (read 2-3 recent state files to understand the data)
- .claude/agent-hub/campaigns-page.html (the new Campaigns page I just built)

Write your outputs to:
.claude/agent-hub/coordinated-sprint/agent-c-output.md

DON'T modify any existing MC code. You're researching and prototyping.

Read the brief, then tell me what you find.`
  },
  {
    name: 'Polisher',
    focus: '/why page + /demo-guide (Sprint 2)',
    text: `Hey, this is a follow-up sprint on Mission Control. You're the Polisher agent, working on 2 pages.

Context: we just ran our first coordinated 4-agent campaign on MC. One agent (Compass) drafted a /why page at .claude/agent-hub/why-page.html, live at localhost:3033/why. It needs work.

Your 2 tasks:

1. Polish /why page. The script is decent but visually it needs to pop for screen-sharing. Make it color-friendly, rich, Apple keynote quality. But more importantly, reframe the VALUE PROPOSITION around these truths:

- Target user: someone at a company like Microsoft who has Claude Code access and wants to be more productive with agents. They're not learning agents from scratch, they just can't surface what's happening across sessions.
- MC is an interface layer on top of CLI. You don't need an IDE. You don't need to look at files. Your job is to create, not to read code. MC gives you command-level visibility without touching the code.
- The "oh shit" moment: "I can see all my agents, what they're doing, what they learned, and what went wrong, without opening a single file."
- MC is both a product AND a self-evolving research project. The more you use it, the better it gets. Findings from mistakes become rules that prevent future mistakes. That flywheel is the killer feature.
- User stories matter. Write for the person thinking "would this make MY life easier?" not for someone evaluating architecture.

2. Create /demo-guide page at .claude/agent-hub/demo-guide.html. Separate from /why. This is internal, for Ephratah to reference before showing MC to someone. Include: what to show first/second/third, talking points per MC page, what's impressive vs rough, pre-demo checklist, how to handle questions. Wire it as a route in server.js at /demo-guide (same pattern as /why).

Read CLAUDE.md at C:\\Users\\ephra\\phredomade\\CLAUDE.md first.

Key files:
- .claude/agent-hub/why-page.html (existing, improve it)
- .claude/agent-hub/server.js (add /demo-guide route)
- .claude/agent-hub/campaigns.json (read debrief for context)
- .claude/agent-hub/findings.json (read for learning loop narrative)

DON'T touch dispatch-page.html, campaigns-page.html, hook.js, or prompt-hook.js.

Design: Plus Jakarta Sans headings, DM Sans body, DM Mono data. Purple #8b5cf6. Apple-inspired. CLAUDE.md Rule #10: every UI must be human-centered and polished.

Tell me your plan before building.`
  }
];

function render() {
  const el = document.getElementById('cards');
  el.innerHTML = prompts.map((p, i) => `
    <div class="prompt-card">
      <div class="prompt-header">
        <div>
          <div class="prompt-name">${p.name}</div>
          <div class="prompt-focus">${p.focus}</div>
        </div>
        <button class="copy-btn" onclick="copyPrompt(${i}, this)" id="copy-${i}">Copy Prompt</button>
      </div>
      <div class="prompt-body">
        <div class="prompt-text">${esc(p.text)}</div>
      </div>
    </div>
  `).join('');
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function copyPrompt(i, btn) {
  try {
    await navigator.clipboard.writeText(prompts[i].text);
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    showToast('Copied ' + prompts[i].name + ' prompt to clipboard');
    setTimeout(() => { btn.textContent = 'Copy Prompt'; btn.classList.remove('copied'); }, 2000);
  } catch (e) {
    // Fallback: select the text
    const body = btn.closest('.prompt-card').querySelector('.prompt-text');
    const range = document.createRange();
    range.selectNodeContents(body);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    showToast('Selected \u2014 press Ctrl+C to copy');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

render();
</script>
</body>
</html>
